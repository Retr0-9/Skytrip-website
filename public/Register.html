<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sky Trip � Register</title>

    <link rel="stylesheet" href="css/Register.css" />
  </head>

  <body>
    <main class="card">
      <div class="logo" aria-hidden="true">
        <svg viewBox="0 0 24 24">
          <path
            d="M15 8a3 3 0 1 1-6 0 3 3 0 0 1 6 0Zm-3 5c-4 0-7 2-7 4v2h14v-2c0-2-3-4-7-4Zm9-3v2h-2v2h-2v-2h-2V10h2V8h2v2h2Z"
          />
        </svg>
      </div>

      <h1>Create Account</h1>
      <p class="sub">Register to start your journey</p>

      <form id="registerForm" autocomplete="on">
        <div class="section-title">Account</div>

        <label for="email">Email</label>
        <div class="input-wrap">
          <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
            <path
              fill="currentColor"
              d="M20 4H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2Zm0 4-8 5-8-5V6l8 5 8-5v2Z"
            />
          </svg>
          <input
            class="input hasIcon"
            id="email"
            name="email"
            type="email"
            placeholder="you@example.com"
            required
          />
        </div>

        <div class="grid">
          <div>
            <label for="password">Password</label>
            <div class="input-wrap">
              <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
                <path
                  fill="currentColor"
                  d="M17 9h-1V7a4 4 0 0 0-8 0v2H7a2 2 0 0 0-2 2v8a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-8a2 2 0 0 0-2-2Zm-7 8v-2a2 2 0 1 1 4 0v2h-4Zm4-8H10V7a2 2 0 0 1 4 0v2Z"
                />
              </svg>
              <input
                class="input hasIcon"
                id="password"
                name="password"
                type="password"
                placeholder="��������"
                required
                minlength="6"
              />
              <button
                class="toggle-pass"
                type="button"
                data-toggle="password"
                aria-label="Show password"
              >
                <svg
                  width="18"
                  height="18"
                  viewBox="0 0 24 24"
                  aria-hidden="true"
                >
                  <path
                    fill="currentColor"
                    d="M12 5c-7 0-10 7-10 7s3 7 10 7 10-7 10-7-3-7-10-7Zm0 12a5 5 0 1 1 0-10 5 5 0 0 1 0 10Zm0-2.5A2.5 2.5 0 1 0 12 9a2.5 2.5 0 0 0 0 5.5Z"
                  />
                </svg>
              </button>
            </div>
          </div>

          <div>
            <label for="confirmPassword">Confirm Password</label>
            <div class="input-wrap">
              <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
                <path
                  fill="currentColor"
                  d="M17 9h-1V7a4 4 0 0 0-8 0v2H7a2 2 0 0 0-2 2v8a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-8a2 2 0 0 0-2-2Zm-7 8v-2a2 2 0 1 1 4 0v2h-4Zm4-8H10V7a2 2 0 0 1 4 0v2Z"
                />
              </svg>
              <input
                class="input hasIcon"
                id="confirmPassword"
                name="confirmPassword"
                type="password"
                placeholder="��������"
                required
                minlength="6"
              />
              <button
                class="toggle-pass"
                type="button"
                data-toggle="confirmPassword"
                aria-label="Show password"
              >
                <svg
                  width="18"
                  height="18"
                  viewBox="0 0 24 24"
                  aria-hidden="true"
                >
                  <path
                    fill="currentColor"
                    d="M12 5c-7 0-10 7-10 7s3 7 10 7 10-7 10-7-3-7-10-7Zm0 12a5 5 0 1 1 0-10 5 5 0 0 1 0 10Zm0-2.5A2.5 2.5 0 1 0 12 9a2.5 2.5 0 0 0 0 5.5Z"
                  />
                </svg>
              </button>
            </div>
          </div>
        </div>

        <div class="section-title">Personal Information</div>

        <div class="grid">
          <div>
            <label for="firstName">First Name *</label>
            <div class="input-wrap">
              <input
                class="input"
                id="firstName"
                name="firstName"
                type="text"
                required
              />
            </div>
          </div>
          <div>
            <label for="lastName">Last Name *</label>
            <div class="input-wrap">
              <input
                class="input"
                id="lastName"
                name="lastName"
                type="text"
                required
              />
            </div>
          </div>
        </div>

        <div class="grid">
          <div>
            <label for="secondName">Second Name</label>
            <div class="input-wrap">
              <input
                class="input"
                id="secondName"
                name="secondName"
                type="text"
              />
            </div>
          </div>
          <div>
            <label for="thirdName">Third Name</label>
            <div class="input-wrap">
              <input
                class="input"
                id="thirdName"
                name="thirdName"
                type="text"
              />
            </div>
          </div>
        </div>

        <div class="grid">
          <div>
            <label for="phone">Phone</label>
            <div class="input-wrap">
              <input
                class="input"
                id="phone"
                name="phone"
                type="tel"
                placeholder="+962..."
              />
            </div>
          </div>
          <div>
            <label for="gender">Gender</label>
            <div class="input-wrap">
              <select class="input" id="gender" name="gender">
                <option value="">Select</option>
                <option value="Male">Male</option>
                <option value="Female">Female</option>
              </select>
            </div>
          </div>
        </div>

        <div class="grid">
          <div>
            <label for="countryId">Country *</label>
            <div class="input-wrap">
              <select class="input" id="countryId" name="countryId" required>
                <option value="">Loading countries...</option>
              </select>
            </div>
          </div>
          <div>
            <label for="birthDate">Birth Date</label>
            <div class="input-wrap">
              <input
                class="input"
                id="birthDate"
                name="birthDate"
                type="date"
              />
            </div>
          </div>
        </div>

        <!-- ? Documentation fields (???? ????) -->
        <div class="section-title">Documentation</div>

        <div class="grid">
          <div>
            <label for="documentationType">Documentation Type *</label>
            <div class="input-wrap">
              <select
                class="input"
                id="documentationType"
                name="documentationType"
                required
              >
                <option value="">Select</option>
                <option value="Passport">Passport</option>
                <option value="NationalID">NationalID</option>
              </select>
            </div>
          </div>
          <div>
            <label for="issueCountryId">Issue Country *</label>
            <div class="input-wrap">
              <select
                class="input"
                id="issueCountryId"
                name="issueCountryId"
                required
              >
                <option value="">Loading countries...</option>
              </select>
            </div>
          </div>
        </div>

        <label for="expirationDate">Expiration Date *</label>
        <div class="input-wrap">
          <input
            class="input"
            id="expirationDate"
            name="expirationDate"
            type="date"
            required
          />
        </div>

        <!-- ? ??? Documentation Image -->
        <div class="section-title">Profile Image</div>

        <label for="profileImage">Profile Image (optional)</label>
        <input
          class="input file"
          id="profileImage"
          name="profileImage"
          type="file"
          accept="image/*"
        />

        <div id="imgPreviewWrap" style="display: none">
          <img id="imgPreview" alt="preview" />
        </div>

        <button class="btn btn-primary" id="registerBtn" type="submit">
          Sign Up <span class="spinner" id="spinner"></span>
        </button>

        <div class="row-actions">
          <button class="btn btn-link" id="backToLoginBtn" type="button">
            Back to Login
          </button>
          <button class="btn btn-link" id="clearBtn" type="button">
            Clear
          </button>
        </div>

        <div class="error" id="errorBox"></div>
        <div class="success" id="successBox"></div>

        <div class="mini" id="resultMini" style="display: none">
          Created: <span class="pill" id="pillUser"></span>
          <span class="pill" id="pillClient"></span>
        </div>
      </form>
    </main>

    <script src="js/Register.js" defer></script>
  </body>
</html>
