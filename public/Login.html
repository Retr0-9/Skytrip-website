<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sky Trip - Login</title>
    <link rel="stylesheet" href="css/Login.css" />
  </head>

  <body>
    <main class="card">
      <div class="logo" aria-hidden="true">
        <svg viewBox="0 0 24 24">
          <path
            d="M21.7 10.2c.4-.2.4-.8 0-1l-8.6-4.3c-.5-.3-1.1.1-1.1.7V9L4.9 7.6c-.5-.1-1 .3-1 .8v2.1c0 .4.3.7.7.8l7.4 1.5v3.5l-2.5 1.2c-.3.2-.5.5-.5.8v1.2c0 .5.5.9 1 .8l3.2-.7 3.2.7c.5.1 1-.3 1-.8v-1.2c0-.3-.2-.6-.5-.8L12 16.3v-3.5l9.7-2.6Z"
          />
        </svg>
      </div>

      <h1>Welcome Back</h1>
      <p class="sub">Sign in to continue your journey</p>

      <form id="loginForm" autocomplete="on">
        <label for="email">Email</label>
        <div class="input-wrap">
          <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
            <path
              fill="currentColor"
              d="M20 4H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2Zm0 4-8 5-8-5V6l8 5 8-5v2Z"
            />
          </svg>
          <input
            class="input"
            id="email"
            name="email"
            type="email"
            placeholder="you@example.com"
            required
          />
        </div>

        <label for="password">Password</label>
        <div class="input-wrap">
          <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
            <path
              fill="currentColor"
              d="M17 9h-1V7a4 4 0 0 0-8 0v2H7a2 2 0 0 0-2 2v8a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-8a2 2 0 0 0-2-2Zm-7 8v-2a2 2 0 1 1 4 0v2h-4Zm4-8H10V7a2 2 0 0 1 4 0v2Z"
            />
          </svg>

          <input
            class="input"
            id="password"
            name="password"
            type="password"
            placeholder="Password"
            required
            minlength="6"
          />

          <button
            class="toggle-pass"
            type="button"
            id="togglePass"
            aria-label="Show password"
          >
            <svg width="18" height="18" viewBox="0 0 24 24" aria-hidden="true">
              <path
                fill="currentColor"
                d="M12 5c-7 0-10 7-10 7s3 7 10 7 10-7 10-7-3-7-10-7Zm0 12a5 5 0 1 1 0-10 5 5 0 0 1 0 10Zm0-2.5A2.5 2.5 0 1 0 12 9a2.5 2.5 0 0 0 0 5.5Z"
              />
            </svg>
          </button>
        </div>

        <button class="btn btn-primary" id="signInBtn" type="submit">
          Sign In <span class="spinner" id="spinner"></span>
        </button>

        <div class="error" id="errorBox"></div>
        <div class="success" id="successBox"></div>

        <p class="bottom">
          Don't have an account? <a href="#" id="signUpLink">Sign Up</a>
        </p>
      </form>
    </main>

    <script src="js/Login.js" defer></script>
  </body>
</html>
