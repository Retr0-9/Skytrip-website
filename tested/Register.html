<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sky Trip • Register</title>

    <style>
      :root {
        /* Base Colors - Modern Theme */
        --bg: #f4f4fb;
        --ink: #0f172a;
        --muted: rgba(100, 116, 139, 1);
        --line: rgba(148, 163, 184, 0.35);

        /* Accent Palette */
        --blue: #38bdf8;
        --blueInk: #0f172a;
        --coral: #fb7185;
        --purple: #a855f7;
        --green: #22c55e;
        --yellow: #facc15;

        /* Shadows */
        --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.04);
        --shadow: 0 8px 30px rgba(0, 0, 0, 0.08);
        --shadow-lg: 0 20px 60px rgba(0, 0, 0, 0.12);
        --shadow-xl: 0 30px 80px rgba(0, 0, 0, 0.15);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          "Helvetica Neue", Arial, sans-serif;
        color: var(--ink);
        background:
          radial-gradient(
            circle at 0% 0%,
            rgba(56, 189, 248, 0.24) 0%,
            transparent 55%
          ),
          radial-gradient(
            circle at 100% 100%,
            rgba(168, 85, 247, 0.2) 0%,
            transparent 55%
          ),
          linear-gradient(180deg, #f9fafb 0%, #eef2ff 40%, #e0f2fe 100%);
        background-attachment: fixed;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 40px 24px;
        position: relative;
        overflow: hidden;
      }

      /* Animated Background Overlay */
      body::before {
        content: "";
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background:
          radial-gradient(
            circle at 30% 30%,
            rgba(255, 255, 255, 0.4) 0%,
            transparent 40%
          ),
          radial-gradient(
            circle at 70% 70%,
            rgba(156, 214, 230, 0.2) 0%,
            transparent 40%
          );
        pointer-events: none;
        z-index: 0;
        animation: breathe 8s ease-in-out infinite;
      }

      @keyframes breathe {
        0%,
        100% {
          opacity: 0.6;
          transform: scale(1);
        }
        50% {
          opacity: 0.8;
          transform: scale(1.05);
        }
      }

      /* Floating Orbs Animation */
      body::after {
        content: "";
        position: fixed;
        width: 600px;
        height: 600px;
        background: radial-gradient(
          circle,
          rgba(168, 85, 247, 0.15) 0%,
          transparent 70%
        );
        border-radius: 50%;
        top: -200px;
        right: -200px;
        animation: float 15s ease-in-out infinite;
        pointer-events: none;
        z-index: 0;
      }

      @keyframes float {
        0%,
        100% {
          transform: translate(0, 0) rotate(0deg);
        }
        33% {
          transform: translate(-50px, 50px) rotate(120deg);
        }
        66% {
          transform: translate(30px, -30px) rotate(240deg);
        }
      }

      .card {
        width: min(600px, 100%);
        background: linear-gradient(
          135deg,
          rgba(255, 255, 255, 0.95),
          rgba(255, 255, 255, 0.85)
        );
        border-radius: 28px;
        box-shadow: var(--shadow-xl);
        backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.9);
        padding: 40px 32px 32px;
        position: relative;
        z-index: 1;
        animation: slideUp 0.6s ease-out;
        overflow: hidden;
        max-height: 90vh;
        overflow-y: auto;
      }

      /* Custom Scrollbar */
      .card::-webkit-scrollbar {
        width: 8px;
      }
      .card::-webkit-scrollbar-track {
        background: rgba(156, 214, 230, 0.1);
        border-radius: 10px;
      }
      .card::-webkit-scrollbar-thumb {
        background: linear-gradient(135deg, var(--blue), var(--purple));
        border-radius: 10px;
      }

      @keyframes slideUp {
        from {
          opacity: 0;
          transform: translateY(30px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* Card Rotating Gradient Background */
      .card::before {
        content: "";
        position: absolute;
        top: -50%;
        right: -50%;
        width: 200%;
        height: 200%;
        background: radial-gradient(
          circle,
          rgba(156, 214, 230, 0.08) 0%,
          transparent 70%
        );
        animation: rotate 20s linear infinite;
        pointer-events: none;
      }

      @keyframes rotate {
        from {
          transform: rotate(0deg);
        }
        to {
          transform: rotate(360deg);
        }
      }

      .logo {
        width: 90px;
        height: 90px;
        border-radius: 24px;
        background: linear-gradient(135deg, var(--blue), var(--purple));
        display: grid;
        place-items: center;
        margin: 0 auto 20px;
        box-shadow: 0 15px 40px rgba(156, 214, 230, 0.4);
        border: 4px solid white;
        position: relative;
        z-index: 1;
        transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        animation: logoEntry 0.8s ease-out 0.2s both;
      }

      @keyframes logoEntry {
        from {
          opacity: 0;
          transform: scale(0.5) rotate(-10deg);
        }
        to {
          opacity: 1;
          transform: scale(1) rotate(0deg);
        }
      }

      .logo:hover {
        transform: rotate(-5deg) scale(1.05);
        box-shadow: 0 20px 50px rgba(156, 214, 230, 0.5);
      }

      .logo svg {
        width: 44px;
        height: 44px;
        fill: white;
      }

      h1 {
        font-size: 32px;
        font-weight: 900;
        margin: 0 0 8px;
        text-align: center;
        letter-spacing: -1px;
        background: linear-gradient(
          135deg,
          var(--blueInk),
          var(--blue),
          var(--purple)
        );
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        position: relative;
        z-index: 1;
        animation: fadeIn 0.8s ease-out 0.3s both;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }

      .sub {
        margin: 0 0 28px;
        text-align: center;
        color: var(--muted);
        font-size: 15px;
        font-weight: 600;
        position: relative;
        z-index: 1;
        animation: fadeIn 0.8s ease-out 0.4s both;
      }

      .section-title {
        margin: 24px 0 16px;
        font-size: 14px;
        font-weight: 800;
        color: var(--ink);
        display: flex;
        align-items: center;
        gap: 10px;
        position: relative;
        z-index: 1;
        letter-spacing: -0.3px;
      }

      .section-title::before {
        content: "";
        width: 12px;
        height: 12px;
        border-radius: 4px;
        background: linear-gradient(135deg, var(--blue), var(--purple));
        display: inline-block;
        box-shadow: 0 2px 8px rgba(156, 214, 230, 0.4);
      }

      label {
        display: block;
        font-size: 13px;
        font-weight: 800;
        color: var(--ink);
        margin: 16px 0 8px;
        letter-spacing: -0.2px;
        position: relative;
        z-index: 1;
      }

      .grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 14px;
        position: relative;
        z-index: 1;
      }

      @media (max-width: 600px) {
        .grid {
          grid-template-columns: 1fr;
        }
      }

      .input-wrap {
        position: relative;
        z-index: 1;
      }

      .input,
      select.input {
        width: 100%;
        height: 52px;
        padding: 0 16px;
        border: 2px solid rgba(156, 214, 230, 0.3);
        border-radius: 16px;
        font-size: 14px;
        font-weight: 600;
        background: white;
        transition: all 0.3s ease;
        outline: none;
        color: var(--ink);
      }

      .input:focus,
      select.input:focus {
        border-color: var(--blue);
        box-shadow: 0 0 0 4px rgba(156, 214, 230, 0.2);
        transform: translateY(-2px);
      }

      .input::placeholder {
        color: rgba(43, 43, 43, 0.3);
      }

      .input.hasIcon {
        padding-left: 48px;
        padding-right: 48px;
      }

      .icon {
        position: absolute;
        left: 16px;
        top: 50%;
        transform: translateY(-50%);
        width: 20px;
        height: 20px;
        opacity: 0.6;
        color: var(--blue);
      }

      .toggle-pass {
        position: absolute;
        right: 14px;
        top: 50%;
        transform: translateY(-50%);
        border: 0;
        background: rgba(156, 214, 230, 0.15);
        cursor: pointer;
        padding: 8px;
        opacity: 0.7;
        border-radius: 10px;
        transition: all 0.2s ease;
        display: grid;
        place-items: center;
      }

      .toggle-pass:hover {
        opacity: 1;
        background: rgba(156, 214, 230, 0.25);
        transform: translateY(-50%) scale(1.05);
      }

      .file {
        padding: 14px 16px;
        height: auto;
        cursor: pointer;
        transition: all 0.3s ease;
      }

      .file:hover {
        border-color: var(--blue);
        background: rgba(156, 214, 230, 0.05);
      }

      .file-note {
        font-size: 12px;
        color: var(--muted);
        margin-top: 8px;
        position: relative;
        z-index: 1;
        padding: 8px 12px;
        background: rgba(156, 214, 230, 0.08);
        border-radius: 10px;
        line-height: 1.5;
      }

      .btn {
        width: 100%;
        height: 52px;
        border: 0;
        border-radius: 16px;
        font-weight: 800;
        font-size: 15px;
        cursor: pointer;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        user-select: none;
        position: relative;
        overflow: hidden;
        z-index: 1;
        box-shadow: var(--shadow);
      }

      .btn::before {
        content: "";
        position: absolute;
        top: 50%;
        left: 50%;
        width: 0;
        height: 0;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.3);
        transform: translate(-50%, -50%);
        transition:
          width 0.6s,
          height 0.6s;
      }

      .btn:hover::before {
        width: 400px;
        height: 400px;
      }

      .btn:hover {
        transform: translateY(-3px);
        box-shadow: var(--shadow-lg);
      }

      .btn:active {
        transform: translateY(-1px);
      }

      .btn-primary {
        background: linear-gradient(135deg, var(--blue), #7ec8db);
        color: var(--blueInk);
        margin-top: 24px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
      }

      .btn-link {
        background: white;
        color: var(--ink);
        border: 2px solid rgba(0, 0, 0, 0.08);
        margin-top: 14px;
      }

      .btn-link:hover {
        border-color: rgba(156, 214, 230, 0.4);
        background: rgba(156, 214, 230, 0.05);
      }

      .row-actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 14px;
        margin-top: 12px;
        position: relative;
        z-index: 1;
      }

      @media (max-width: 600px) {
        .row-actions {
          grid-template-columns: 1fr;
        }
      }

      .hint {
        margin-top: 20px;
        font-size: 12px;
        color: var(--muted);
        text-align: center;
        line-height: 1.5;
        position: relative;
        z-index: 1;
        padding: 12px;
        background: rgba(156, 214, 230, 0.08);
        border-radius: 12px;
      }

      .hint b {
        color: var(--ink);
      }

      .error,
      .success {
        display: none;
        margin-top: 16px;
        padding: 14px 16px;
        border-radius: 14px;
        font-size: 13px;
        font-weight: 600;
        line-height: 1.5;
        position: relative;
        z-index: 1;
        animation: slideIn 0.3s ease-out;
      }

      @keyframes slideIn {
        from {
          opacity: 0;
          transform: translateY(-10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .error {
        background: linear-gradient(
          135deg,
          rgba(251, 113, 133, 0.15),
          rgba(251, 113, 133, 0.08)
        );
        border: 2px solid rgba(251, 113, 133, 0.3);
        color: #9b2c2c;
      }

      .success {
        background: linear-gradient(
          135deg,
          rgba(34, 197, 94, 0.15),
          rgba(34, 197, 94, 0.08)
        );
        border: 2px solid rgba(34, 197, 94, 0.3);
        color: #1f7a4d;
      }

      .spinner {
        display: none;
        width: 16px;
        height: 16px;
        border: 2px solid rgba(15, 23, 42, 0.3);
        border-top-color: var(--blueInk);
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .mini {
        font-size: 13px;
        color: var(--muted);
        margin-top: 12px;
        text-align: center;
        position: relative;
        z-index: 1;
      }

      .pill {
        display: inline-block;
        padding: 6px 14px;
        border-radius: 999px;
        background: linear-gradient(
          135deg,
          rgba(156, 214, 230, 0.2),
          rgba(162, 155, 254, 0.15)
        );
        font-weight: 800;
        color: var(--ink);
        font-size: 11px;
        margin: 0 4px;
        box-shadow: 0 2px 8px rgba(156, 214, 230, 0.2);
        border: 1px solid rgba(156, 214, 230, 0.3);
      }

      #imgPreviewWrap {
        margin-top: 12px;
        text-align: center;
        position: relative;
        z-index: 1;
        animation: fadeIn 0.3s ease-out;
      }

      #imgPreview {
        width: 100px;
        height: 100px;
        border-radius: 20px;
        object-fit: cover;
        border: 3px solid white;
        box-shadow: 0 8px 24px rgba(156, 214, 230, 0.4);
      }

      /* Responsive */
      @media (max-width: 600px) {
        .card {
          padding: 32px 24px 24px;
        }
        h1 {
          font-size: 28px;
        }
        .logo {
          width: 80px;
          height: 80px;
        }
      }
    </style>
  </head>

  <body>
    <main class="card">
      <div class="logo" aria-hidden="true">
        <svg viewBox="0 0 24 24">
          <path
            d="M15 8a3 3 0 1 1-6 0 3 3 0 0 1 6 0Zm-3 5c-4 0-7 2-7 4v2h14v-2c0-2-3-4-7-4Zm9-3v2h-2v2h-2v-2h-2V10h2V8h2v2h2Z"
          />
        </svg>
      </div>

      <h1>Create Account</h1>
      <p class="sub">Register to start your journey</p>

      <form id="registerForm" autocomplete="on">
        <div class="section-title">Account</div>

        <label for="email">Email</label>
        <div class="input-wrap">
          <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
            <path
              fill="currentColor"
              d="M20 4H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2Zm0 4-8 5-8-5V6l8 5 8-5v2Z"
            />
          </svg>
          <input
            class="input hasIcon"
            id="email"
            name="email"
            type="email"
            placeholder="you@example.com"
            required
          />
        </div>

        <div class="grid">
          <div>
            <label for="password">Password</label>
            <div class="input-wrap">
              <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
                <path
                  fill="currentColor"
                  d="M17 9h-1V7a4 4 0 0 0-8 0v2H7a2 2 0 0 0-2 2v8a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-8a2 2 0 0 0-2-2Zm-7 8v-2a2 2 0 1 1 4 0v2h-4Zm4-8H10V7a2 2 0 0 1 4 0v2Z"
                />
              </svg>
              <input
                class="input hasIcon"
                id="password"
                name="password"
                type="password"
                placeholder="••••••••"
                required
                minlength="6"
              />
              <button
                class="toggle-pass"
                type="button"
                data-toggle="password"
                aria-label="Show password"
              >
                <svg
                  width="18"
                  height="18"
                  viewBox="0 0 24 24"
                  aria-hidden="true"
                >
                  <path
                    fill="currentColor"
                    d="M12 5c-7 0-10 7-10 7s3 7 10 7 10-7 10-7-3-7-10-7Zm0 12a5 5 0 1 1 0-10 5 5 0 0 1 0 10Zm0-2.5A2.5 2.5 0 1 0 12 9a2.5 2.5 0 0 0 0 5.5Z"
                  />
                </svg>
              </button>
            </div>
          </div>

          <div>
            <label for="confirmPassword">Confirm Password</label>
            <div class="input-wrap">
              <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
                <path
                  fill="currentColor"
                  d="M17 9h-1V7a4 4 0 0 0-8 0v2H7a2 2 0 0 0-2 2v8a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-8a2 2 0 0 0-2-2Zm-7 8v-2a2 2 0 1 1 4 0v2h-4Zm4-8H10V7a2 2 0 0 1 4 0v2Z"
                />
              </svg>
              <input
                class="input hasIcon"
                id="confirmPassword"
                name="confirmPassword"
                type="password"
                placeholder="••••••••"
                required
                minlength="6"
              />
              <button
                class="toggle-pass"
                type="button"
                data-toggle="confirmPassword"
                aria-label="Show password"
              >
                <svg
                  width="18"
                  height="18"
                  viewBox="0 0 24 24"
                  aria-hidden="true"
                >
                  <path
                    fill="currentColor"
                    d="M12 5c-7 0-10 7-10 7s3 7 10 7 10-7 10-7-3-7-10-7Zm0 12a5 5 0 1 1 0-10 5 5 0 0 1 0 10Zm0-2.5A2.5 2.5 0 1 0 12 9a2.5 2.5 0 0 0 0 5.5Z"
                  />
                </svg>
              </button>
            </div>
          </div>
        </div>

        <div class="section-title">Personal Information</div>

        <div class="grid">
          <div>
            <label for="firstName">First Name *</label>
            <div class="input-wrap">
              <input
                class="input"
                id="firstName"
                name="firstName"
                type="text"
                required
              />
            </div>
          </div>
          <div>
            <label for="lastName">Last Name *</label>
            <div class="input-wrap">
              <input
                class="input"
                id="lastName"
                name="lastName"
                type="text"
                required
              />
            </div>
          </div>
        </div>

        <div class="grid">
          <div>
            <label for="secondName">Second Name</label>
            <div class="input-wrap">
              <input
                class="input"
                id="secondName"
                name="secondName"
                type="text"
              />
            </div>
          </div>
          <div>
            <label for="thirdName">Third Name</label>
            <div class="input-wrap">
              <input
                class="input"
                id="thirdName"
                name="thirdName"
                type="text"
              />
            </div>
          </div>
        </div>

        <div class="grid">
          <div>
            <label for="phone">Phone</label>
            <div class="input-wrap">
              <input
                class="input"
                id="phone"
                name="phone"
                type="tel"
                placeholder="+962..."
              />
            </div>
          </div>
          <div>
            <label for="gender">Gender</label>
            <div class="input-wrap">
              <select class="input" id="gender" name="gender">
                <option value="">Select</option>
                <option value="Male">Male</option>
                <option value="Female">Female</option>
              </select>
            </div>
          </div>
        </div>

        <div class="grid">
          <div>
            <label for="countryId">Country *</label>
            <div class="input-wrap">
              <select class="input" id="countryId" name="countryId" required>
                <option value="">Loading countries...</option>
              </select>
            </div>
          </div>
          <div>
            <label for="birthDate">Birth Date</label>
            <div class="input-wrap">
              <input
                class="input"
                id="birthDate"
                name="birthDate"
                type="date"
              />
            </div>
          </div>
        </div>

        <!-- ✅ Documentation fields (بدون صورة) -->
        <div class="section-title">Documentation</div>

        <div class="grid">
          <div>
            <label for="documentationType">Documentation Type *</label>
            <div class="input-wrap">
              <select
                class="input"
                id="documentationType"
                name="documentationType"
                required
              >
                <option value="">Select</option>
                <option value="Passport">Passport</option>
                <option value="NationalID">NationalID</option>
              </select>
            </div>
          </div>
          <div>
            <label for="issueCountryId">Issue Country *</label>
            <div class="input-wrap">
              <select
                class="input"
                id="issueCountryId"
                name="issueCountryId"
                required
              >
                <option value="">Loading countries...</option>
              </select>
            </div>
          </div>
        </div>

        <label for="expirationDate">Expiration Date *</label>
        <div class="input-wrap">
          <input
            class="input"
            id="expirationDate"
            name="expirationDate"
            type="date"
            required
          />
        </div>

        <!-- ✅ بدل Documentation Image -->
        <div class="section-title">Profile Image</div>

        <label for="profileImage">Profile Image (optional)</label>
        <input
          class="input file"
          id="profileImage"
          name="profileImage"
          type="file"
          accept="image/*"
        />

        <div id="imgPreviewWrap" style="display: none">
          <img id="imgPreview" alt="preview" />
        </div>

        <button class="btn btn-primary" id="registerBtn" type="submit">
          Sign Up <span class="spinner" id="spinner"></span>
        </button>

        <div class="row-actions">
          <button class="btn btn-link" id="backToLoginBtn" type="button">
            Back to Login
          </button>
          <button class="btn btn-link" id="clearBtn" type="button">
            Clear
          </button>
        </div>

        <div class="error" id="errorBox"></div>
        <div class="success" id="successBox"></div>

        <div class="mini" id="resultMini" style="display: none">
          Created: <span class="pill" id="pillUser"></span>
          <span class="pill" id="pillClient"></span>
        </div>
      </form>
    </main>

    <script>
      /************************************************************
       * Register.js (FULL)
       * - Loads countries into 2 dropdowns:
       *   countryId (person country) + issueCountryId (doc issue country)
       * - Register -> save token/userId/clientId/email
       * - Optional upload profile image after register
       ************************************************************/

      const API_BASE_URL =
        "https://bookingtrip-api-2026-cyh0f4dhfednh3fj.westeurope-01.azurewebsites.net";

      const ENDPOINTS = {
        countries: "/api/Country/All",
        register: "/api/Login/register",
        uploadProfileImage: "/api/profile/me/image",
      };

      const NEXT_PAGE = "Home.html";

      const form = document.getElementById("registerForm");
      const registerBtn = document.getElementById("registerBtn");
      const spinner = document.getElementById("spinner");
      const errorBox = document.getElementById("errorBox");
      const successBox = document.getElementById("successBox");
      const backToLoginBtn = document.getElementById("backToLoginBtn");
      const clearBtn = document.getElementById("clearBtn");
      const resultMini = document.getElementById("resultMini");
      const pillUser = document.getElementById("pillUser");
      const pillClient = document.getElementById("pillClient");

      const countrySelect = document.getElementById("countryId");
      const issueCountrySelect = document.getElementById("issueCountryId");

      const profileImageInput = document.getElementById("profileImage");
      const imgPreviewWrap = document.getElementById("imgPreviewWrap");
      const imgPreview = document.getElementById("imgPreview");

      function setLoading(isLoading) {
        registerBtn.disabled = isLoading;
        spinner.style.display = isLoading ? "inline-block" : "none";
        registerBtn.style.opacity = isLoading ? "0.9" : "1";
      }

      function showError(msg) {
        successBox.style.display = "none";
        errorBox.textContent = msg || "Request failed.";
        errorBox.style.display = "block";
      }

      function showSuccess(msg) {
        errorBox.style.display = "none";
        successBox.textContent = msg || "Success.";
        successBox.style.display = "block";
      }

      function extractErrorMessage(data) {
        if (!data) return "Request failed.";
        if (typeof data === "string") return data;
        return (
          data.detail ||
          data.message ||
          data.error ||
          data.title ||
          (Array.isArray(data.errors) ? data.errors.join(", ") : null) ||
          (data.errors && typeof data.errors === "object"
            ? Object.values(data.errors).flat().join(", ")
            : null) ||
          "Request failed."
        );
      }

      // Show/hide password for both fields
      document.querySelectorAll("[data-toggle]").forEach((btn) => {
        btn.addEventListener("click", () => {
          const targetId = btn.getAttribute("data-toggle");
          const input = document.getElementById(targetId);
          const isPassword = input.type === "password";
          input.type = isPassword ? "text" : "password";
          btn.setAttribute(
            "aria-label",
            isPassword ? "Hide password" : "Show password",
          );
        });
      });

      // Profile image preview
      profileImageInput?.addEventListener("change", () => {
        const f = profileImageInput.files?.[0];
        if (!f) {
          imgPreviewWrap.style.display = "none";
          imgPreview.removeAttribute("src");
          return;
        }
        imgPreview.src = URL.createObjectURL(f);
        imgPreviewWrap.style.display = "block";
      });

      function toIsoDateOrNull(v) {
        return v ? v : null; // yyyy-mm-dd
      }

      function clearAuthStorage() {
        localStorage.removeItem("token");
        localStorage.removeItem("userId");
        localStorage.removeItem("clientId");
        localStorage.removeItem("email");
        localStorage.removeItem("profileImageUrl");
      }

      function saveAuthStorage({ token, userId, clientId, email }) {
        localStorage.setItem("token", token);
        localStorage.setItem("userId", String(userId));
        localStorage.setItem("clientId", String(clientId));
        if (email) localStorage.setItem("email", String(email));
      }

      async function readBody(res) {
        const text = await res.text().catch(() => "");
        if (!text) return null;
        try {
          return JSON.parse(text);
        } catch {
          return text;
        }
      }

      async function apiFetch(url, options = {}) {
        const headers = {
          Accept: "application/json, text/plain, */*",
          ...(options.headers || {}),
        };

        const hasBody = options.body !== undefined && options.body !== null;
        const isFormData = hasBody && options.body instanceof FormData;
        if (hasBody && !isFormData && !headers["Content-Type"]) {
          headers["Content-Type"] = "application/json";
        }

        const res = await fetch(url, {
          ...options,
          headers,
          cache: "no-store",
        });
        const body = await readBody(res);

        if (!res.ok) {
          throw new Error(extractErrorMessage(body) || `HTTP ${res.status}`);
        }
        return body;
      }

      async function loadCountriesIntoSelects() {
        countrySelect.innerHTML = `<option value="">Loading countries...</option>`;
        issueCountrySelect.innerHTML = `<option value="">Loading countries...</option>`;

        try {
          const data = await apiFetch(API_BASE_URL + ENDPOINTS.countries, {
            method: "GET",
          });

          const list = Array.isArray(data) ? data : [];

          const baseOpt = `<option value="">Select country</option>`;
          countrySelect.innerHTML = baseOpt;
          issueCountrySelect.innerHTML = baseOpt;

          list.forEach((c) => {
            const id = c.countryID ?? c.countryId ?? c.CountryID ?? c.CountryId;
            const name =
              c.countryName ?? c.CountryName ?? (id ? `Country #${id}` : null);
            if (!id || !name) return;

            const opt = document.createElement("option");
            opt.value = String(id);
            opt.textContent = name;
            countrySelect.appendChild(opt);

            const opt2 = document.createElement("option");
            opt2.value = String(id);
            opt2.textContent = name;
            issueCountrySelect.appendChild(opt2);
          });
        } catch (e) {
          console.error("Countries load failed:", e);
          countrySelect.innerHTML = `<option value="">(Failed to load countries)</option>`;
          issueCountrySelect.innerHTML = `<option value="">(Failed to load countries)</option>`;
          showError("Failed to load countries.");
        }
      }

      async function uploadProfileImage(file, token) {
        const fd = new FormData();
        // ✅ لازم اسم الحقل "image" عشان يطابق API
        fd.append("image", file);

        const res = await fetch(API_BASE_URL + ENDPOINTS.uploadProfileImage, {
          method: "POST",
          headers: { Authorization: `Bearer ${token}` },
          cache: "no-store",
          body: fd,
        });

        const body = await readBody(res);
        if (!res.ok) throw new Error(extractErrorMessage(body));
        return body; // { imageUrl: "/uploads/profiles/..." }
      }

      form.addEventListener("submit", async (e) => {
        e.preventDefault();

        errorBox.style.display = "none";
        successBox.style.display = "none";
        resultMini.style.display = "none";

        clearAuthStorage();

        const email = form.email.value.trim();
        const password = form.password.value;
        const confirmPassword = form.confirmPassword.value;

        if (!email || !password || !confirmPassword) {
          showError("All account fields are required.");
          return;
        }
        if (password.length < 6) {
          showError("Password must be at least 6 characters.");
          return;
        }
        if (password !== confirmPassword) {
          showError("Passwords do not match.");
          return;
        }

        const firstName = form.firstName.value.trim();
        const lastName = form.lastName.value.trim();

        const countryId = Number(countrySelect.value || 0) || 0;

        const documentationType = form.documentationType.value;
        const issueCountryId = Number(issueCountrySelect.value || 0) || 0;
        const expirationDate = form.expirationDate.value;

        if (!firstName || !lastName || !countryId) {
          showError("First Name, Last Name, and Country are required.");
          return;
        }
        if (!documentationType || !issueCountryId || !expirationDate) {
          showError(
            "Documentation Type, Issue Country, and Expiration Date are required.",
          );
          return;
        }

        const payload = {
          email,
          password,

          firstName,
          secondName: form.secondName.value.trim() || null,
          thirdName: form.thirdName.value.trim() || null,
          lastName,

          phone: form.phone.value.trim() || null,
          gender: form.gender.value || null,
          countryID: countryId,
          birthDate: toIsoDateOrNull(form.birthDate.value),

          documentationType,
          issueCountryID: issueCountryId,
          expirationDate: expirationDate,
        };

        setLoading(true);

        try {
          const data = await apiFetch(API_BASE_URL + ENDPOINTS.register, {
            method: "POST",
            body: JSON.stringify(payload),
          });

          const token = data?.token ?? data?.Token ?? null;
          const userId = data?.userId ?? data?.userID ?? data?.UserID ?? null;
          const clientId =
            data?.clientId ?? data?.clientID ?? data?.ClientID ?? null;

          if (!token || !userId || !clientId) {
            console.log("REGISTER RESPONSE RAW:", data);
            showError(
              "Register succeeded but token/userId/clientId missing in response.",
            );
            return;
          }

          saveAuthStorage({ token, userId, clientId, email });

          pillUser.textContent = `UserID: ${userId}`;
          pillClient.textContent = `ClientID: ${clientId}`;
          resultMini.style.display = "block";

          showSuccess("Registered ✅ (logged in automatically)");

          // ✅ optional upload profile image
          const file = document.getElementById("profileImage").files?.[0];
          if (file) {
            try {
              const up = await uploadProfileImage(file, token);
              if (up?.imageUrl)
                localStorage.setItem("profileImageUrl", up.imageUrl);
              showSuccess("Registered ✅ and profile image uploaded ✅");
            } catch (uploadErr) {
              showError(
                `Registered ✅ لكن فشل رفع صورة البروفايل: ${uploadErr?.message || "Upload failed"}`,
              );
            }
          }

          setTimeout(() => {
            window.location.href = NEXT_PAGE;
          }, 400);
        } catch (err) {
          console.error(err);
          showError(err?.message || "Network error or API not reachable.");
        } finally {
          setLoading(false);
        }
      });

      backToLoginBtn.addEventListener("click", () => {
        window.location.href = "Login.html";
      });

      clearBtn.addEventListener("click", () => {
        form.reset();
        errorBox.style.display = "none";
        successBox.style.display = "none";
        resultMini.style.display = "none";
        imgPreviewWrap.style.display = "none";
        imgPreview.removeAttribute("src");
        loadCountriesIntoSelects();
      });

      document.addEventListener("DOMContentLoaded", () => {
        loadCountriesIntoSelects();
      });
    </script>
  </body>
</html>
