<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sky Trip • Login</title>
    <style>
      :root {
        /* Base Colors - Modern Theme */
        --bg: #f4f4fb;
        --ink: #0f172a;
        --muted: rgba(100, 116, 139, 1);
        --line: rgba(148, 163, 184, 0.35);

        /* Accent Palette */
        --blue: #38bdf8;
        --blueInk: #0f172a;
        --coral: #fb7185;
        --purple: #a855f7;
        --green: #22c55e;
        --yellow: #facc15;

        /* Shadows */
        --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.04);
        --shadow: 0 8px 30px rgba(0, 0, 0, 0.08);
        --shadow-lg: 0 20px 60px rgba(0, 0, 0, 0.12);
        --shadow-xl: 0 30px 80px rgba(0, 0, 0, 0.15);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          "Helvetica Neue", Arial, sans-serif;
        color: var(--ink);
        background:
          radial-gradient(
            circle at 0% 0%,
            rgba(56, 189, 248, 0.24) 0%,
            transparent 55%
          ),
          radial-gradient(
            circle at 100% 100%,
            rgba(168, 85, 247, 0.2) 0%,
            transparent 55%
          ),
          linear-gradient(180deg, #f9fafb 0%, #eef2ff 40%, #e0f2fe 100%);
        background-attachment: fixed;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        position: relative;
        overflow: hidden;
      }

      /* Animated Background Overlay */
      body::before {
        content: "";
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background:
          radial-gradient(
            circle at 30% 30%,
            rgba(255, 255, 255, 0.4) 0%,
            transparent 40%
          ),
          radial-gradient(
            circle at 70% 70%,
            rgba(156, 214, 230, 0.2) 0%,
            transparent 40%
          );
        pointer-events: none;
        z-index: 0;
        animation: breathe 8s ease-in-out infinite;
      }

      @keyframes breathe {
        0%,
        100% {
          opacity: 0.6;
          transform: scale(1);
        }
        50% {
          opacity: 0.8;
          transform: scale(1.05);
        }
      }

      /* Floating Orbs Animation */
      body::after {
        content: "";
        position: fixed;
        width: 600px;
        height: 600px;
        background: radial-gradient(
          circle,
          rgba(168, 85, 247, 0.15) 0%,
          transparent 70%
        );
        border-radius: 50%;
        top: -200px;
        right: -200px;
        animation: float 15s ease-in-out infinite;
        pointer-events: none;
        z-index: 0;
      }

      @keyframes float {
        0%,
        100% {
          transform: translate(0, 0) rotate(0deg);
        }
        33% {
          transform: translate(-50px, 50px) rotate(120deg);
        }
        66% {
          transform: translate(30px, -30px) rotate(240deg);
        }
      }

      .card {
        width: min(440px, 100%);
        background: linear-gradient(
          135deg,
          rgba(255, 255, 255, 0.95),
          rgba(255, 255, 255, 0.85)
        );
        border-radius: 28px;
        box-shadow: var(--shadow-xl);
        backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.9);
        padding: 40px 32px 32px;
        position: relative;
        z-index: 1;
        animation: slideUp 0.6s ease-out;
        overflow: hidden;
      }

      @keyframes slideUp {
        from {
          opacity: 0;
          transform: translateY(30px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* Card Rotating Gradient Background */
      .card::before {
        content: "";
        position: absolute;
        top: -50%;
        right: -50%;
        width: 200%;
        height: 200%;
        background: radial-gradient(
          circle,
          rgba(156, 214, 230, 0.08) 0%,
          transparent 70%
        );
        animation: rotate 20s linear infinite;
        pointer-events: none;
      }

      @keyframes rotate {
        from {
          transform: rotate(0deg);
        }
        to {
          transform: rotate(360deg);
        }
      }

      .logo {
        width: 90px;
        height: 90px;
        border-radius: 24px;
        background: linear-gradient(135deg, var(--blue), var(--purple));
        display: grid;
        place-items: center;
        margin: 0 auto 20px;
        box-shadow: 0 15px 40px rgba(156, 214, 230, 0.4);
        border: 4px solid white;
        position: relative;
        z-index: 1;
        transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        animation: logoEntry 0.8s ease-out 0.2s both;
      }

      @keyframes logoEntry {
        from {
          opacity: 0;
          transform: scale(0.5) rotate(-10deg);
        }
        to {
          opacity: 1;
          transform: scale(1) rotate(0deg);
        }
      }

      .logo:hover {
        transform: rotate(-5deg) scale(1.05);
        box-shadow: 0 20px 50px rgba(156, 214, 230, 0.5);
      }

      .logo svg {
        width: 44px;
        height: 44px;
        fill: white;
      }

      h1 {
        font-size: 32px;
        font-weight: 900;
        margin: 0 0 8px;
        text-align: center;
        letter-spacing: -1px;
        background: linear-gradient(
          135deg,
          var(--blueInk),
          var(--blue),
          var(--purple)
        );
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        position: relative;
        z-index: 1;
        animation: fadeIn 0.8s ease-out 0.3s both;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }

      .sub {
        margin: 0 0 28px;
        text-align: center;
        color: var(--muted);
        font-size: 15px;
        font-weight: 600;
        position: relative;
        z-index: 1;
        animation: fadeIn 0.8s ease-out 0.4s both;
      }

      label {
        display: block;
        font-size: 13px;
        font-weight: 800;
        color: var(--ink);
        margin: 20px 0 8px;
        letter-spacing: -0.2px;
        position: relative;
        z-index: 1;
      }

      .input-wrap {
        position: relative;
        z-index: 1;
      }

      .input {
        width: 100%;
        height: 52px;
        padding: 0 48px;
        border: 2px solid rgba(156, 214, 230, 0.3);
        border-radius: 16px;
        font-size: 14px;
        font-weight: 600;
        background: white;
        transition: all 0.3s ease;
        outline: none;
        color: var(--ink);
      }

      .input:focus {
        border-color: var(--blue);
        box-shadow: 0 0 0 4px rgba(156, 214, 230, 0.2);
        transform: translateY(-2px);
      }

      .input::placeholder {
        color: rgba(43, 43, 43, 0.3);
      }

      .icon {
        position: absolute;
        left: 16px;
        top: 50%;
        transform: translateY(-50%);
        width: 20px;
        height: 20px;
        opacity: 0.6;
        color: var(--blue);
      }

      .toggle-pass {
        position: absolute;
        right: 14px;
        top: 50%;
        transform: translateY(-50%);
        border: 0;
        background: rgba(156, 214, 230, 0.15);
        cursor: pointer;
        padding: 8px;
        opacity: 0.7;
        border-radius: 10px;
        transition: all 0.2s ease;
        display: grid;
        place-items: center;
      }

      .toggle-pass:hover {
        opacity: 1;
        background: rgba(156, 214, 230, 0.25);
        transform: translateY(-50%) scale(1.05);
      }

      .btn {
        width: 100%;
        height: 52px;
        border: 0;
        border-radius: 16px;
        font-weight: 800;
        font-size: 15px;
        cursor: pointer;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        user-select: none;
        position: relative;
        overflow: hidden;
        z-index: 1;
        box-shadow: var(--shadow);
      }

      .btn::before {
        content: "";
        position: absolute;
        top: 50%;
        left: 50%;
        width: 0;
        height: 0;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.3);
        transform: translate(-50%, -50%);
        transition:
          width 0.6s,
          height 0.6s;
      }

      .btn:hover::before {
        width: 400px;
        height: 400px;
      }

      .btn:hover {
        transform: translateY(-3px);
        box-shadow: var(--shadow-lg);
      }

      .btn:active {
        transform: translateY(-1px);
      }

      .btn-primary {
        background: linear-gradient(135deg, var(--blue), #7ec8db);
        color: var(--blueInk);
        margin-top: 24px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
      }

      .btn-secondary {
        background: white;
        color: var(--ink);
        border: 2px solid rgba(0, 0, 0, 0.08);
        margin-top: 14px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
      }

      .btn-secondary:hover {
        border-color: rgba(156, 214, 230, 0.4);
        background: rgba(156, 214, 230, 0.05);
      }

      .google-icon {
        width: 18px;
        height: 18px;
      }

      .bottom {
        text-align: center;
        margin-top: 24px;
        font-size: 14px;
        color: var(--muted);
        font-weight: 600;
        position: relative;
        z-index: 1;
      }

      .bottom a {
        color: var(--blue);
        text-decoration: none;
        font-weight: 800;
        transition: all 0.2s ease;
      }

      .bottom a:hover {
        text-decoration: underline;
        color: var(--purple);
      }

      .hint {
        margin-top: 20px;
        font-size: 12px;
        color: var(--muted);
        text-align: center;
        line-height: 1.5;
        position: relative;
        z-index: 1;
        padding: 12px;
        background: rgba(156, 214, 230, 0.08);
        border-radius: 12px;
      }

      .hint b {
        color: var(--ink);
      }

      .error,
      .success {
        display: none;
        margin-top: 16px;
        padding: 14px 16px;
        border-radius: 14px;
        font-size: 13px;
        font-weight: 600;
        line-height: 1.5;
        position: relative;
        z-index: 1;
        animation: slideIn 0.3s ease-out;
      }

      @keyframes slideIn {
        from {
          opacity: 0;
          transform: translateY(-10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .error {
        background: linear-gradient(
          135deg,
          rgba(251, 113, 133, 0.15),
          rgba(251, 113, 133, 0.08)
        );
        border: 2px solid rgba(251, 113, 133, 0.3);
        color: #9b2c2c;
      }

      .success {
        background: linear-gradient(
          135deg,
          rgba(34, 197, 94, 0.15),
          rgba(34, 197, 94, 0.08)
        );
        border: 2px solid rgba(34, 197, 94, 0.3);
        color: #1f7a4d;
      }

      .spinner {
        display: none;
        width: 16px;
        height: 16px;
        border: 2px solid rgba(15, 23, 42, 0.3);
        border-top-color: var(--blueInk);
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      /* Responsive */
      @media (max-width: 500px) {
        .card {
          padding: 32px 24px 24px;
        }
        h1 {
          font-size: 28px;
        }
        .logo {
          width: 80px;
          height: 80px;
        }
      }
    </style>
  </head>

  <body>
    <main class="card">
      <div class="logo" aria-hidden="true">
        <svg viewBox="0 0 24 24">
          <path
            d="M21.7 10.2c.4-.2.4-.8 0-1l-8.6-4.3c-.5-.3-1.1.1-1.1.7V9L4.9 7.6c-.5-.1-1 .3-1 .8v2.1c0 .4.3.7.7.8l7.4 1.5v3.5l-2.5 1.2c-.3.2-.5.5-.5.8v1.2c0 .5.5.9 1 .8l3.2-.7 3.2.7c.5.1 1-.3 1-.8v-1.2c0-.3-.2-.6-.5-.8L12 16.3v-3.5l9.7-2.6Z"
          />
        </svg>
      </div>

      <h1>Welcome Back</h1>
      <p class="sub">Sign in to continue your journey</p>

      <form id="loginForm" autocomplete="on">
        <label for="email">Email</label>
        <div class="input-wrap">
          <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
            <path
              fill="currentColor"
              d="M20 4H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2Zm0 4-8 5-8-5V6l8 5 8-5v2Z"
            />
          </svg>
          <input
            class="input"
            id="email"
            name="email"
            type="email"
            placeholder="you@example.com"
            required
          />
        </div>

        <label for="password">Password</label>
        <div class="input-wrap">
          <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
            <path
              fill="currentColor"
              d="M17 9h-1V7a4 4 0 0 0-8 0v2H7a2 2 0 0 0-2 2v8a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-8a2 2 0 0 0-2-2Zm-7 8v-2a2 2 0 1 1 4 0v2h-4Zm4-8H10V7a2 2 0 0 1 4 0v2Z"
            />
          </svg>

          <input
            class="input"
            id="password"
            name="password"
            type="password"
            placeholder="••••••••"
            required
            minlength="6"
          />

          <button
            class="toggle-pass"
            type="button"
            id="togglePass"
            aria-label="Show password"
          >
            <svg width="18" height="18" viewBox="0 0 24 24" aria-hidden="true">
              <path
                fill="currentColor"
                d="M12 5c-7 0-10 7-10 7s3 7 10 7 10-7 10-7-3-7-10-7Zm0 12a5 5 0 1 1 0-10 5 5 0 0 1 0 10Zm0-2.5A2.5 2.5 0 1 0 12 9a2.5 2.5 0 0 0 0 5.5Z"
              />
            </svg>
          </button>
        </div>

        <button class="btn btn-primary" id="signInBtn" type="submit">
          Sign In <span class="spinner" id="spinner"></span>
        </button>

        <div class="error" id="errorBox"></div>
        <div class="success" id="successBox"></div>

        <p class="bottom">
          Don't have an account? <a href="#" id="signUpLink">Sign Up</a>
        </p>
      </form>
    </main>

    <script>
      const API_BASE_URL =
        "https://bookingtrip-api-2026-cyh0f4dhfednh3fj.westeurope-01.azurewebsites.net";
      const LOGIN_ENDPOINT = "/api/Login/login";
      const NEXT_PAGE = "Home.html"; // عدّلها

      const form = document.getElementById("loginForm");
      const signInBtn = document.getElementById("signInBtn");
      const spinner = document.getElementById("spinner");
      const errorBox = document.getElementById("errorBox");
      const successBox = document.getElementById("successBox");
      const togglePass = document.getElementById("togglePass");
      const passwordInput = document.getElementById("password");
      const signUpLink = document.getElementById("signUpLink");

      function setLoading(isLoading) {
        signInBtn.disabled = isLoading;
        spinner.style.display = isLoading ? "inline-block" : "none";
        signInBtn.style.opacity = isLoading ? "0.9" : "1";
      }

      function showError(msg) {
        successBox.style.display = "none";
        errorBox.textContent = msg || "Login failed.";
        errorBox.style.display = "block";
      }

      function showSuccess(msg) {
        errorBox.style.display = "none";
        successBox.textContent = msg || "Success.";
        successBox.style.display = "block";
      }

      function safeJson(res) {
        return res.text().then((t) => {
          try {
            return t ? JSON.parse(t) : null;
          } catch {
            return t;
          }
        });
      }

      // ✅ امسح فقط مفاتيحنا (مش localStorage كله)
      function clearAuthStorage() {
        [
          "token",
          "auth_token",
          "userId",
          "userID",
          "clientId",
          "clientID",
          "personId",
          "personID",
          "email",
          "role",
        ].forEach((k) => localStorage.removeItem(k));
      }

      // ✅ Decode JWT payload
      function parseJwt(token) {
        try {
          const payload = token.split(".")[1];
          const json = atob(payload.replace(/-/g, "+").replace(/_/g, "/"));
          return JSON.parse(decodeURIComponent(escape(json)));
        } catch {
          return null;
        }
      }

      // ✅ قراءة claims بأسماء مختلفة
      function pick(obj, ...keys) {
        for (const k of keys) {
          const v = obj?.[k];
          if (v !== undefined && v !== null && v !== "") return v;
        }
        return null;
      }

      togglePass?.addEventListener("click", () => {
        const isPassword = passwordInput.type === "password";
        passwordInput.type = isPassword ? "text" : "password";
        togglePass.setAttribute(
          "aria-label",
          isPassword ? "Hide password" : "Show password",
        );
      });

      signUpLink?.addEventListener("click", (e) => {
        e.preventDefault();
        window.location.href = "Register.html";
      });

      form.addEventListener("submit", async (e) => {
        e.preventDefault();

        errorBox.style.display = "none";
        successBox.style.display = "none";

        const email = form.email.value.trim();
        const password = form.password.value;

        if (!email || !password) {
          showError("Email and password are required.");
          return;
        }

        setLoading(true);

        try {
          clearAuthStorage();

          const res = await fetch(API_BASE_URL + LOGIN_ENDPOINT, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              Accept: "application/json",
            },
            body: JSON.stringify({ email, password }),
          });

          const data = await safeJson(res);

          if (!res.ok) {
            const msg =
              (data &&
                (data.message || data.title || data.error || data.detail)) ||
              "Invalid email or password";
            showError(msg);
            return;
          }

          // =========================
          // ✅ 1) token from response
          // =========================
          const token =
            data?.token ||
            data?.Token ||
            data?.accessToken ||
            data?.jwt ||
            null;

          if (!token) {
            console.log("LOGIN RESPONSE:", data);
            showError("Login response did not include a token.");
            return;
          }

          // ✅ أهم خطوة: خزّن التوكن بالمفتاح اللي صفحاتك بتستخدمه
          localStorage.setItem("token", token);
          // optional backward compatibility:
          localStorage.setItem("auth_token", token);

          // =========================
          // ✅ 2) Try read ids from response, if missing decode JWT
          // =========================
          let userId =
            data?.userId ??
            data?.userID ??
            data?.UserId ??
            data?.UserID ??
            null;
          let clientId =
            data?.clientId ??
            data?.clientID ??
            data?.ClientId ??
            data?.ClientID ??
            null;
          let personId =
            data?.personId ??
            data?.personID ??
            data?.PersonId ??
            data?.PersonID ??
            null;
          let role = (data?.role ?? data?.Role ?? "").toString();
          let returnedEmail = data?.email ?? data?.Email ?? email;

          const jwt = parseJwt(token);
          if (jwt) {
            // UserID
            userId =
              userId ??
              pick(
                jwt,
                "http://schemas.xmlsoap.org/ws/2005/05/identity/claims/nameidentifier",
                "userId",
                "UserId",
                "sub",
              );

            // Role
            role =
              role ||
              pick(
                jwt,
                "http://schemas.microsoft.com/ws/2008/06/identity/claims/role",
                "role",
                "Role",
              ) ||
              "";

            // Email
            returnedEmail =
              returnedEmail ||
              pick(
                jwt,
                "http://schemas.xmlsoap.org/ws/2005/05/identity/claims/emailaddress",
                "email",
                "Email",
              ) ||
              email;

            // personId/clientId claims (زي اللي انت عاملهم بالسيرفر)
            personId =
              personId ?? pick(jwt, "personId", "personID", "PersonId");
            clientId =
              clientId ?? pick(jwt, "clientId", "clientID", "ClientId");
          }

          // =========================
          // ✅ 3) Store normalized keys ONLY
          // =========================
          if (userId) localStorage.setItem("userId", String(userId));
          if (clientId) localStorage.setItem("clientId", String(clientId));
          if (personId) localStorage.setItem("personId", String(personId));
          if (returnedEmail)
            localStorage.setItem("email", String(returnedEmail));
          if (role) localStorage.setItem("role", String(role));

          showSuccess("Login successful ✅");

          // =========================
          // ✅ 4) Redirect
          // =========================
          if (role.toLowerCase() === "admin") {
            window.location.href = "Admin.html";
            return;
          }
          if (role.toLowerCase() === "employee") {
            window.location.href = "Employee.html";
            return;
          }
          if (role.toLowerCase() === "client") {
            window.location.href = "Home.html";
            return;
          }
          window.location.href = NEXT_PAGE;
        } catch (err) {
          console.error(err);
          showError(
            "Network error. Check API_BASE_URL, CORS, and whether the API is running.",
          );
        } finally {
          setLoading(false);
        }
      });
    </script>
  </body>
</html>
