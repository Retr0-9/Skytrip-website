<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Sky Trip • Payment Cancelled</title>
    <style>
      body {
        margin: 0;
        font-family: system-ui;
        background: #efe7dc;
        color: #2b2b2b;
      }
      .wrap {
        max-width: 640px;
        margin: 70px auto;
        padding: 0 16px;
      }
      .card {
        background: rgba(255, 255, 255, 0.88);
        border-radius: 18px;
        padding: 20px;
        border: 1px solid rgba(0, 0, 0, 0.08);
      }
      .btn {
        display: inline-block;
        margin-top: 12px;
        padding: 12px 18px;
        border-radius: 999px;
        background: #8cc9d8;
        color: #0f2b31;
        font-weight: 700;
        text-decoration: none;
      }
      p {
        color: rgba(43, 43, 43, 0.62);
        margin: 6px 0 0;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <h1>Payment cancelled</h1>
        <p>No worries—your booking is still pending.</p>
        <a class="btn" href="Payment.html">Try again</a>
      </div>
    </div>
  </body>
</html>
