<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sky Trip - Selected Flight</title>
    <style>
      body {
        margin: 0;
        font-family:
          ui-sans-serif,
          system-ui,
          -apple-system,
          "Segoe UI",
          Roboto,
          Arial,
          sans-serif;
        background: #f3eee7;
        color: #2b2b2b;
      }
      .wrap {
        max-width: 900px;
        margin: 0 auto;
        padding: 18px 16px 40px;
      }
      .card {
        background: rgba(255, 255, 255, 0.88);
        border: 1px solid rgba(0, 0, 0, 0.06);
        border-radius: 18px;
        padding: 14px;
      }
      .btn {
        display: inline-block;
        margin-top: 12px;
        border: 1px solid rgba(0, 0, 0, 0.12);
        background: rgba(255, 255, 255, 0.7);
        padding: 10px 12px;
        border-radius: 14px;
        cursor: pointer;
        font-weight: 900;
        font-size: 12px;
      }
      pre {
        background: rgba(255, 255, 255, 0.6);
        border: 1px solid rgba(0, 0, 0, 0.08);
        border-radius: 14px;
        padding: 12px;
        overflow: auto;
        max-height: 320px;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h2>Selected Flight (Placeholder)</h2>

      <div class="card">
        <div style="font-weight: 900; margin-bottom: 8px">
          This page is intentionally simple for now.
        </div>

        <div
          style="
            color: rgba(43, 43, 43, 0.7);
            font-weight: 800;
            font-size: 13px;
          "
        >
          We saved the selected flight in
          <code>sessionStorage.selectedFlight</code>
        </div>

        <pre id="flightBox">Loading...</pre>

        <button class="btn" id="backBtn">← Back to results</button>
      </div>
    </div>

    <script>
      const box = document.getElementById("flightBox");
      const s = sessionStorage.getItem("selectedFlight");
      box.textContent = s
        ? JSON.stringify(JSON.parse(s), null, 2)
        : "No selectedFlight found.";

      document
        .getElementById("backBtn")
        .addEventListener("click", () => history.back());
    </script>
  </body>
</html>
