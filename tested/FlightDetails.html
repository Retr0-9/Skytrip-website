<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sky Trip • Flight Details</title>

    <style>
      :root {
        /* Base Colors - Modern Theme */
        --bg: #f4f4fb;
        --ink: #0f172a;
        --muted: rgba(100, 116, 139, 1);
        --line: rgba(148, 163, 184, 0.35);

        /* Accent Palette */
        --blue: #38bdf8;
        --blueInk: #0f172a;
        --coral: #fb7185;
        --purple: #a855f7;
        --green: #22c55e;
        --yellow: #facc15;

        /* Shadows */
        --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.04);
        --shadow: 0 8px 30px rgba(0, 0, 0, 0.08);
        --shadow-lg: 0 20px 60px rgba(0, 0, 0, 0.12);
        --shadow-xl: 0 30px 80px rgba(0, 0, 0, 0.15);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          "Helvetica Neue", Arial, sans-serif;
        color: var(--ink);
        background:
          radial-gradient(
            circle at 0% 0%,
            rgba(56, 189, 248, 0.24) 0%,
            transparent 55%
          ),
          radial-gradient(
            circle at 100% 100%,
            rgba(168, 85, 247, 0.2) 0%,
            transparent 55%
          ),
          linear-gradient(180deg, #f9fafb 0%, #eef2ff 40%, #e0f2fe 100%);
        background-attachment: fixed;
        min-height: 100vh;
        padding: 24px;
        display: flex;
        justify-content: center;
        position: relative;
        overflow-x: hidden;
      }

      /* Animated Background Overlay */
      body::before {
        content: "";
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background:
          radial-gradient(
            circle at 30% 30%,
            rgba(255, 255, 255, 0.4) 0%,
            transparent 40%
          ),
          radial-gradient(
            circle at 70% 70%,
            rgba(156, 214, 230, 0.2) 0%,
            transparent 40%
          );
        pointer-events: none;
        z-index: 0;
        animation: breathe 8s ease-in-out infinite;
      }

      @keyframes breathe {
        0%,
        100% {
          opacity: 0.6;
          transform: scale(1);
        }
        50% {
          opacity: 0.8;
          transform: scale(1.05);
        }
      }

      .page {
        width: 100%;
        max-width: 600px;
        position: relative;
        z-index: 1;
        animation: fadeInUp 0.6s ease-out;
      }

      @keyframes fadeInUp {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .topbar {
        display: flex;
        align-items: center;
        gap: 14px;
        margin-bottom: 20px;
        animation: fadeIn 0.8s ease-out 0.2s both;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }

      .back {
        width: 44px;
        height: 44px;
        border-radius: 14px;
        border: none;
        background: linear-gradient(
          135deg,
          rgba(255, 255, 255, 0.95),
          rgba(255, 255, 255, 0.85)
        );
        backdrop-filter: blur(10px);
        box-shadow: var(--shadow);
        cursor: pointer;
        font-size: 20px;
        transition: all 0.3s ease;
        display: grid;
        place-items: center;
        color: var(--ink);
      }

      .back:hover {
        transform: translateY(-2px);
        box-shadow: var(--shadow-lg);
        background: linear-gradient(
          135deg,
          rgba(156, 214, 230, 0.3),
          rgba(162, 155, 254, 0.2)
        );
      }

      .top-title h1 {
        margin: 0;
        font-size: 24px;
        font-weight: 900;
        letter-spacing: -0.5px;
        background: linear-gradient(
          135deg,
          var(--blueInk),
          var(--blue),
          var(--purple)
        );
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .top-title p {
        margin: 4px 0 0;
        font-size: 13px;
        color: var(--muted);
        font-weight: 600;
      }

      .card {
        background: linear-gradient(
          135deg,
          rgba(255, 255, 255, 0.95),
          rgba(255, 255, 255, 0.85)
        );
        border-radius: 24px;
        box-shadow: var(--shadow-xl);
        backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.9);
        padding: 24px;
        margin-bottom: 20px;
        position: relative;
        overflow: hidden;
        transition: all 0.3s ease;
        animation: scaleIn 0.6s ease-out 0.3s both;
      }

      @keyframes scaleIn {
        from {
          opacity: 0;
          transform: scale(0.95);
        }
        to {
          opacity: 1;
          transform: scale(1);
        }
      }

      .card:hover {
        box-shadow: var(--shadow-xl);
        transform: translateY(-2px);
      }

      /* Card Rotating Gradient Background */
      .card::before {
        content: "";
        position: absolute;
        top: -50%;
        right: -50%;
        width: 200%;
        height: 200%;
        background: radial-gradient(
          circle,
          rgba(156, 214, 230, 0.08) 0%,
          transparent 70%
        );
        animation: rotate 20s linear infinite;
        pointer-events: none;
      }

      @keyframes rotate {
        from {
          transform: rotate(0deg);
        }
        to {
          transform: rotate(360deg);
        }
      }

      .flight-head {
        display: flex;
        align-items: center;
        gap: 16px;
        margin-bottom: 20px;
        position: relative;
        z-index: 1;
      }

      .plane {
        width: 56px;
        height: 56px;
        border-radius: 18px;
        background: linear-gradient(135deg, var(--blue), var(--purple));
        display: grid;
        place-items: center;
        color: white;
        font-size: 26px;
        box-shadow: 0 8px 24px rgba(156, 214, 230, 0.4);
        border: 3px solid white;
        transition: all 0.4s ease;
      }

      .plane:hover {
        transform: rotate(-5deg) scale(1.05);
      }

      .flight-title {
        position: relative;
        z-index: 1;
      }

      .flight-title strong {
        display: block;
        font-size: 18px;
        font-weight: 900;
        color: var(--ink);
        letter-spacing: -0.5px;
      }

      .flight-title span {
        font-size: 13px;
        color: var(--muted);
        font-weight: 600;
        margin-top: 4px;
        display: block;
      }

      /* Timeline */
      .timeline {
        display: grid;
        grid-template-columns: auto 1fr;
        gap: 16px;
        margin: 20px 0;
        position: relative;
        z-index: 1;
      }

      .dot {
        width: 14px;
        height: 14px;
        background: linear-gradient(135deg, var(--blue), var(--purple));
        border-radius: 50%;
        margin-top: 6px;
        box-shadow: 0 4px 12px rgba(156, 214, 230, 0.5);
        animation: pulse 2s ease-in-out infinite;
      }

      @keyframes pulse {
        0%,
        100% {
          transform: scale(1);
          opacity: 1;
        }
        50% {
          transform: scale(1.15);
          opacity: 0.8;
        }
      }

      .line {
        width: 3px;
        background: linear-gradient(180deg, var(--blue), var(--purple));
        margin: 6px auto;
        height: 50px;
        border-radius: 999px;
        box-shadow: 0 2px 8px rgba(156, 214, 230, 0.3);
      }

      .time {
        position: relative;
        z-index: 1;
      }

      .time strong {
        font-size: 16px;
        font-weight: 900;
        color: var(--ink);
      }

      .time p {
        margin: 6px 0 0;
        font-size: 13px;
        color: var(--muted);
        font-weight: 600;
      }

      .duration {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 13px;
        color: var(--muted);
        margin-left: 30px;
        font-weight: 700;
        padding: 8px 12px;
        background: rgba(156, 214, 230, 0.1);
        border-radius: 10px;
        width: fit-content;
      }

      .divider {
        height: 2px;
        background: linear-gradient(
          90deg,
          transparent,
          rgba(156, 214, 230, 0.3),
          transparent
        );
        margin: 20px 0;
        position: relative;
        z-index: 1;
      }

      .row {
        display: flex;
        justify-content: space-between;
        font-size: 14px;
        margin: 10px 0;
        font-weight: 700;
        color: var(--ink);
        position: relative;
        z-index: 1;
        padding: 8px 0;
      }

      .row span:last-child {
        color: var(--muted);
      }

      .row.total {
        font-weight: 900;
        font-size: 16px;
        padding: 12px 0;
        color: var(--ink);
      }

      .row.total span:last-child {
        background: linear-gradient(135deg, var(--blue), var(--purple));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      /* Segments list */
      .seglist {
        display: grid;
        gap: 12px;
        margin-top: 14px;
        position: relative;
        z-index: 1;
      }

      .seg {
        border: 2px solid rgba(156, 214, 230, 0.2);
        border-radius: 18px;
        padding: 16px;
        background: linear-gradient(
          135deg,
          rgba(255, 255, 255, 0.8),
          rgba(255, 255, 255, 0.6)
        );
        transition: all 0.3s ease;
        position: relative;
        overflow: hidden;
      }

      .seg::before {
        content: "";
        position: absolute;
        left: 0;
        top: 0;
        width: 4px;
        height: 100%;
        background: linear-gradient(135deg, var(--blue), var(--purple));
        opacity: 0;
        transition: opacity 0.3s ease;
      }

      .seg:hover {
        border-color: var(--blue);
        box-shadow: 0 6px 20px rgba(156, 214, 230, 0.3);
        transform: translateX(4px);
      }

      .seg:hover::before {
        opacity: 1;
      }

      .seg-top {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 12px;
      }

      .seg-top strong {
        font-size: 14px;
        font-weight: 900;
        color: var(--ink);
      }

      .seg-top small {
        display: block;
        margin-top: 6px;
        color: var(--muted);
        font-size: 12px;
        font-weight: 600;
        line-height: 1.4;
      }

      .seg-actions {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        justify-content: flex-end;
      }

      .chip {
        border: 2px solid rgba(0, 0, 0, 0.08);
        background: white;
        padding: 8px 14px;
        border-radius: 12px;
        font-weight: 800;
        font-size: 12px;
        cursor: pointer;
        transition: all 0.3s ease;
        box-shadow: var(--shadow-sm);
      }

      .chip:hover {
        transform: translateY(-2px);
        box-shadow: var(--shadow);
        border-color: rgba(156, 214, 230, 0.4);
      }

      .chip.primary {
        border: 0;
        color: var(--blueInk);
        background: linear-gradient(135deg, var(--blue), #7ec8db);
        box-shadow: 0 4px 12px rgba(156, 214, 230, 0.4);
      }

      .chip.primary:hover {
        box-shadow: 0 6px 18px rgba(156, 214, 230, 0.5);
      }

      /* CTA Buttons */
      .cta {
        width: 100%;
        border: none;
        border-radius: 16px;
        padding: 16px 20px;
        font-weight: 800;
        font-size: 15px;
        cursor: pointer;
        box-shadow: var(--shadow);
        background: white;
        margin-bottom: 12px;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        position: relative;
        overflow: hidden;
        z-index: 1;
        color: var(--ink);
        border: 2px solid rgba(0, 0, 0, 0.08);
        animation: slideIn 0.6s ease-out 0.5s both;
      }

      @keyframes slideIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .cta::before {
        content: "";
        position: absolute;
        top: 50%;
        left: 50%;
        width: 0;
        height: 0;
        border-radius: 50%;
        background: rgba(156, 214, 230, 0.3);
        transform: translate(-50%, -50%);
        transition:
          width 0.6s,
          height 0.6s;
      }

      .cta:hover::before {
        width: 400px;
        height: 400px;
      }

      .cta:hover {
        transform: translateY(-3px);
        box-shadow: var(--shadow-lg);
        border-color: rgba(156, 214, 230, 0.4);
      }

      .cta:active {
        transform: translateY(-1px);
      }

      .cta[disabled] {
        opacity: 0.6;
        cursor: not-allowed;
        transform: none;
      }

      .cta[disabled]:hover {
        transform: none;
      }

      .cta-primary {
        background: linear-gradient(135deg, var(--blue), #7ec8db);
        color: var(--blueInk);
        border: 0;
        box-shadow: 0 8px 24px rgba(156, 214, 230, 0.4);
      }

      .cta-primary:hover {
        box-shadow: 0 12px 32px rgba(156, 214, 230, 0.5);
      }

      .msg {
        margin-top: 16px;
        font-size: 13px;
        color: var(--muted);
        text-align: center;
        font-weight: 600;
        position: relative;
        z-index: 1;
        padding: 10px;
        background: rgba(156, 214, 230, 0.08);
        border-radius: 12px;
      }

      .error {
        display: none;
        margin-top: 16px;
        padding: 14px 16px;
        border-radius: 16px;
        font-size: 13px;
        background: linear-gradient(
          135deg,
          rgba(251, 113, 133, 0.15),
          rgba(251, 113, 133, 0.08)
        );
        border: 2px solid rgba(251, 113, 133, 0.3);
        color: #9b2c2c;
        font-weight: 600;
        position: relative;
        z-index: 1;
      }

      .bookerr {
        display: none;
        margin-top: 12px;
        padding: 14px 16px;
        border-radius: 16px;
        background: linear-gradient(
          135deg,
          rgba(251, 113, 133, 0.15),
          rgba(251, 113, 133, 0.08)
        );
        border: 2px solid rgba(251, 113, 133, 0.3);
        color: #9b2c2c;
        font-weight: 700;
        font-size: 13px;
        position: relative;
        z-index: 1;
      }

      /* Section Headers */
      strong[style*="font-size: 13px"] {
        position: relative;
        z-index: 1;
        display: block;
        margin-bottom: 12px;
        font-size: 15px !important;
        font-weight: 900;
        letter-spacing: -0.3px;
      }

      /* Responsive */
      @media (max-width: 600px) {
        .page {
          max-width: 100%;
        }

        .top-title h1 {
          font-size: 20px;
        }

        .card {
          padding: 20px;
        }

        .plane {
          width: 50px;
          height: 50px;
        }

        .seg-top {
          flex-direction: column;
        }

        .seg-actions {
          justify-content: flex-start;
        }
      }
    </style>
  </head>

  <body>
    <div class="page">
      <div class="topbar">
        <button class="back" onclick="history.back()">←</button>
        <div class="top-title">
          <h1>Flight Details</h1>
          <p id="airlineSub">Sky Trip Airlines</p>
        </div>
      </div>

      <!-- Flight Card -->
      <div class="card">
        <div class="flight-head">
          <div class="plane">✈</div>
          <div class="flight-title">
            <strong id="airlineName">Loading...</strong>
            <span id="flightNo">Trip ...</span>
          </div>
        </div>

        <!-- Main "first segment" timeline preview -->
        <div class="timeline" id="timelinePreview">
          <div>
            <div class="dot"></div>
            <div class="line"></div>
            <div class="dot"></div>
          </div>

          <div>
            <div class="time">
              <strong id="depTime">--:--</strong>
              <p id="depCity">-</p>
            </div>

            <div class="duration">⏱ <span id="duration">--</span></div>

            <div class="time">
              <strong id="arrTime">--:--</strong>
              <p id="arrCity">-</p>
            </div>
          </div>
        </div>

        <div class="divider"></div>

        <strong style="font-size: 13px">🧳 Baggage Information</strong>
        <div class="row"><span>Cabin</span><span id="cabinKg">--</span></div>
        <div class="row">
          <span>Checked</span><span id="checkedKg">--</span>
        </div>

        <div class="divider"></div>

        <strong style="font-size: 13px">🧩 Segments</strong>
        <div class="seglist" id="segmentsHost"></div>

        <div class="error" id="errorBox"></div>
        <div class="msg" id="statusMsg">Loading from API...</div>
      </div>

      <!-- Price Card -->
      <div class="card">
        <strong style="font-size: 13px">💲 Price Breakdown</strong>
        <div class="row">
          <span>Base Fare</span><span id="baseFare">--</span>
        </div>
        <div class="row"><span>Class Fees</span><span id="taxes">--</span></div>
        <div class="divider"></div>
        <div class="row total">
          <span>Total</span><span id="total">--</span>
        </div>
      </div>

      <button id="continueBtn" class="cta cta-primary">
        Continue to Passenger Info
      </button>

      <div id="bookErr" class="bookerr"></div>

      <script>
        /************************************************************
         * CONFIG
         ************************************************************/
        const API_BASE_URL =
          sessionStorage.getItem("API_BASE_URL") ||
          "https://bookingtrip-api-2026-cyh0f4dhfednh3fj.westeurope-01.azurewebsites.net";

        const ENDPOINTS = {
          flightDetails: (id) => `/api/FlightSchedules/${id}`,
          passengerClassById: (id) => `/api/PassengerClass/${id}`,
          clientByPerson: (personId) => `/api/Client/ByPerson/${personId}`,
          createBookingTrip: "/api/BookingTrip",
          getTicketByBooking: (bookId) =>
            `/api/InfoTickets/ByBooking/${bookId}`,
          createTicket: "/api/InfoTickets",
          createTicketFlight: "/api/TicketFlights",
        };

        /************************************************************
         * AUTH + HELPERS
         ************************************************************/
        const $ = (id) => document.getElementById(id);

        function getAuthHeaders() {
          const token = localStorage.getItem("auth_token");
          return token ? { Authorization: "Bearer " + token } : {};
        }

        function qs(name) {
          return new URLSearchParams(window.location.search).get(name);
        }

        function safeJsonParse(v, fallback) {
          try {
            return JSON.parse(v);
          } catch {
            return fallback;
          }
        }

        function showError(msg) {
          const box = $("errorBox");
          box.textContent = msg;
          box.style.display = "block";
          $("statusMsg").textContent = "Failed to load.";
        }

        function showBookError(msg) {
          const p = $("bookErr");
          p.textContent = msg;
          p.style.display = "block";
        }

        function setStatus(msg) {
          $("statusMsg").textContent = msg;
        }

        function extractId(obj, keys) {
          for (const k of keys) {
            const v = obj?.[k];
            if (v != null && Number(v) > 0) return Number(v);
          }
          return null;
        }

        function pick(obj, ...keys) {
          for (const k of keys) {
            const v = obj?.[k];
            if (v !== undefined && v !== null && String(v).trim() !== "")
              return v;
          }
          return null;
        }

        // (اختياري) mapping لأسماء المدن/الدول — خليها كما هي أو عدّلها لاحقاً
        const CITY_NAME_MAP = {
          AMM: "AMM",
          UK: "UK",
          KSA: "KSA",
          USA: "USA",
        };
        function cityLabel(code) {
          const c = String(code || "").trim();
          return CITY_NAME_MAP[c] || c || "—";
        }

        /************************************************************
         * API GET/POST
         ************************************************************/
        async function apiGet(path) {
          const res = await fetch(API_BASE_URL + path, {
            headers: { Accept: "application/json", ...getAuthHeaders() },
          });

          const ct = (res.headers.get("content-type") || "").toLowerCase();
          const data = ct.includes("application/json")
            ? await res.json().catch(() => null)
            : await res.text().catch(() => null);

          if (!res.ok) {
            const msg =
              data?.detail ||
              data?.message ||
              data?.title ||
              (typeof data === "string" ? data : "") ||
              res.statusText;
            throw new Error(`GET ${path} -> ${res.status} - ${msg}`);
          }
          return data ?? {};
        }

        async function apiPost(path, body) {
          const res = await fetch(API_BASE_URL + path, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              Accept: "application/json",
              ...getAuthHeaders(),
            },
            body: JSON.stringify(body),
          });

          const ct = (res.headers.get("content-type") || "").toLowerCase();
          const data = ct.includes("application/json")
            ? await res.json().catch(() => null)
            : await res.text().catch(() => null);

          if (!res.ok) {
            const msg =
              data?.detail ||
              data?.message ||
              data?.title ||
              (typeof data === "string" ? data : "") ||
              res.statusText;
            throw new Error(`POST ${path} -> ${res.status} - ${msg}`);
          }

          return { data: data ?? {}, res };
        }

        /************************************************************
         * FORMATTERS
         ************************************************************/
        function formatTime(t) {
          if (!t) return "--:--";
          const s = String(t);
          const hhmm = s.includes("T") ? s.split("T")[1] : s;
          const [hh, mm] = hhmm.split(":");
          const h = Number(hh);
          const ampm = h >= 12 ? "PM" : "AM";
          const h12 = ((h + 11) % 12) + 1;
          return `${String(h12).padStart(2, "0")}:${String(mm).padStart(
            2,
            "0",
          )} ${ampm}`;
        }

        function calcDuration(dep, arr) {
          if (!dep || !arr) return "--";
          const [dh, dm] = String(dep).split(":").map(Number);
          const [ah, am] = String(arr).split(":").map(Number);

          let depMin = dh * 60 + dm;
          let arrMin = ah * 60 + am;
          if (arrMin < depMin) arrMin += 24 * 60;

          const diff = arrMin - depMin;
          const h = Math.floor(diff / 60);
          const m = diff % 60;
          return `${h}h ${String(m).padStart(2, "0")}m`;
        }

        function fmtMoneyJOD(n) {
          const num = Number(n);
          if (Number.isNaN(num)) return "--";
          return num.toFixed(2) + " JOD";
        }

        function fmtDateLike(v) {
          if (!v) return "—";
          const s = String(v);
          return s.includes("T") ? s.split("T")[0] : s;
        }

        /************************************************************
         * READ ITINERARY (supports oneway/round/multi)
         ************************************************************/
        function readSelectedItinerary() {
          const it = safeJsonParse(
            sessionStorage.getItem("selectedItinerary"),
            null,
          );
          if (it && Array.isArray(it.segments)) return it;

          const f = safeJsonParse(
            sessionStorage.getItem("selectedFlight"),
            null,
          );
          if (f) {
            return {
              totalPrice: null,
              segments: [
                {
                  flightScheduleId:
                    f.flightScheduleId ??
                    f.FlightScheduleId ??
                    f.flightScheduleID ??
                    f.FlightScheduleID ??
                    f.id ??
                    f.ID ??
                    Number(qs("id")) ??
                    null,

                  from: pick(
                    f,
                    "from",
                    "From",
                    "departureCity",
                    "DepartureCity",
                  ),
                  to: pick(f, "to", "To", "arrivalCity", "ArrivalCity"),
                  date: pick(f, "date", "Date", "flightDate", "FlightDate"),
                  basePrice: pick(f, "basePrice", "BasePrice"),
                  departureTime: pick(f, "departureTime", "DepartureTime"),
                  arrivalTime: pick(f, "arrivalTime", "ArrivalTime"),
                },
              ],
            };
          }

          const id = Number(qs("id") || "0") || null;
          if (id)
            return { totalPrice: null, segments: [{ flightScheduleId: id }] };

          return null;
        }

        function segId(seg) {
          return (
            seg.flightScheduleId ??
            seg.FlightScheduleId ??
            seg.flightScheduleID ??
            seg.FlightScheduleID ??
            seg.id ??
            seg.ID ??
            null
          );
        }

        /************************************************************
         * Load schedule objects for all segments (fix undefined)
         ************************************************************/
        async function loadSchedulesForSegments(segments) {
          const loaded = [];

          for (const seg of segments) {
            const id = segId(seg);
            if (!id) continue;

            const depCity = pick(
              seg,
              "departureCity",
              "DepartureCity",
              "from",
              "From",
            );
            const arrCity = pick(seg, "arrivalCity", "ArrivalCity", "to", "To");
            const depTime = pick(seg, "departureTime", "DepartureTime");
            const arrTime = pick(seg, "arrivalTime", "ArrivalTime");
            const date = pick(seg, "flightDate", "FlightDate", "date", "Date");
            const base = pick(seg, "basePrice", "BasePrice");

            const hasDetails = depCity || arrCity || depTime || arrTime || base;

            if (hasDetails) {
              loaded.push({
                flightScheduleId: Number(id),
                departureCity: cityLabel(depCity ?? "—"),
                arrivalCity: cityLabel(arrCity ?? "—"),
                departureTime: depTime ?? "—",
                arrivalTime: arrTime ?? "—",
                flightDate: date ?? null,
                basePrice: Number(base) || 0,
              });
              continue;
            }

            const fs = await apiGet(ENDPOINTS.flightDetails(id));

            loaded.push({
              flightScheduleId: Number(id),
              departureCity: cityLabel(
                pick(fs, "departureCity", "DepartureCity") ?? "—",
              ),
              arrivalCity: cityLabel(
                pick(fs, "arrivalCity", "ArrivalCity") ?? "—",
              ),
              departureTime: pick(fs, "departureTime", "DepartureTime") ?? "—",
              arrivalTime: pick(fs, "arrivalTime", "ArrivalTime") ?? "—",
              flightDate: pick(fs, "flightDate", "FlightDate") ?? null,
              basePrice: Number(pick(fs, "basePrice", "BasePrice")) || 0,
            });
          }

          return loaded;
        }

        /************************************************************
         * UI RENDER
         ************************************************************/
        function renderHeader(tripType, schedules) {
          $("airlineName").textContent = "Sky Trip Airlines";
          $("airlineSub").textContent = `Trip Type: ${tripType || "—"}`;

          const n = schedules.length;
          const first = schedules[0];
          const last = schedules[n - 1];

          const route =
            n > 0
              ? `${first.departureCity ?? "—"} → ${last.arrivalCity ?? "—"}`
              : "—";
          $("flightNo").textContent = `${route} • ${n} segment(s)`;

          if (first) {
            $("depTime").textContent = formatTime(first.departureTime);
            $("depCity").textContent = `${first.departureCity} - Departure`;
            $("arrTime").textContent = formatTime(first.arrivalTime);
            $("arrCity").textContent = `${first.arrivalCity} - Arrival`;
            $("duration").textContent = calcDuration(
              first.departureTime,
              first.arrivalTime,
            );
          }

          $("cabinKg").textContent = "7 kg";
          $("checkedKg").textContent = "23 kg";
        }

        function renderSegmentsList(tripType, schedules) {
          const host = $("segmentsHost");
          host.innerHTML = "";

          schedules.forEach((s, idx) => {
            let label = "Segment";
            const t = String(tripType || "").toLowerCase();
            if (t.includes("round")) label = idx === 0 ? "Outbound" : "Return";
            else if (t.includes("multi")) label = `Leg ${idx + 1}`;

            const date = fmtDateLike(s.flightDate);

            const el = document.createElement("div");
            el.className = "seg";
            el.innerHTML = `
        <div class="seg-top">
          <div>
            <strong>${label}: ${s.departureCity ?? "—"} → ${s.arrivalCity ?? "—"}</strong>
            <small>
              ${date} • ${String(s.departureTime || "--").slice(0, 5)} → ${String(
                s.arrivalTime || "--",
              ).slice(0, 5)} • Base: ${fmtMoneyJOD(s.basePrice || 0)}
            </small>
          </div>
          <div class="seg-actions">
            <button class="chip primary" data-act="focus" data-idx="${idx}">Focus</button>
          </div>
        </div>
      `;
            host.appendChild(el);
          });

          host.onclick = (e) => {
            const btn = e.target.closest("button[data-act]");
            if (!btn) return;

            const act = btn.getAttribute("data-act");
            const idx = Number(btn.getAttribute("data-idx"));
            const s = schedules[idx];
            if (!s) return;

            if (act === "seat") {
              window.location.href =
                "SeatMap.html?id=" +
                encodeURIComponent(String(s.flightScheduleId));
            }

            if (act === "focus") {
              $("depTime").textContent = formatTime(s.departureTime);
              $("depCity").textContent = `${s.departureCity} - Departure`;
              $("arrTime").textContent = formatTime(s.arrivalTime);
              $("arrCity").textContent = `${s.arrivalCity} - Arrival`;
              $("duration").textContent = calcDuration(
                s.departureTime,
                s.arrivalTime,
              );
              window.scrollTo({ top: 0, behavior: "smooth" });
            }
          };
        }

        /************************************************************
         * Pricing (Base vs PassengerClass Fee)
         ************************************************************/
        async function getPassengerClassFee(passengerClassID) {
          if (!passengerClassID || passengerClassID < 1) return 0;
          const pc = await apiGet(
            ENDPOINTS.passengerClassById(passengerClassID),
          );
          return (
            Number(
              pc?.feesClass ??
                pc?.FeesClass ??
                pc?.feeClass ??
                pc?.FeeClass ??
                pc?.fees ??
                pc?.Fees ??
                0,
            ) || 0
          );
        }

        async function renderPriceForItinerary(itinerary, schedules) {
          const pax =
            Number(sessionStorage.getItem("totalPassengers") || "1") || 1;
          const passengerClassID =
            Number(sessionStorage.getItem("passengerClassID") || "0") || 0;

          const classFeePerPax = await getPassengerClassFee(passengerClassID);

          const basePerPaxSum = schedules.reduce(
            (acc, s) => acc + (Number(s.basePrice) || 0),
            0,
          );

          const baseTotal = basePerPaxSum * pax;
          const classTotal = classFeePerPax * pax;

          // ✅ total محسوب لتجنب تضارب totalPrice من API
          const total = baseTotal + classTotal;

          $("baseFare").textContent = fmtMoneyJOD(baseTotal);
          $("taxes").textContent = fmtMoneyJOD(classTotal);
          $("total").textContent = fmtMoneyJOD(total);

          // ✅ إظهار اسم الكلاس داخل label بدون تعديل HTML
          const className = sessionStorage.getItem("selectedClassName") || "—";
          const taxesRowLabel =
            $("taxes")?.parentElement?.querySelector("span");
          if (taxesRowLabel)
            taxesRowLabel.textContent = `Class Fees (${className})`;

          sessionStorage.setItem("flightTotal", String(total));
          sessionStorage.setItem("currency", "jod");
        }

        /************************************************************
         * ClientID ensure
         ************************************************************/
        async function ensureClientId() {
          const existing = Number(localStorage.getItem("clientID") || "0") || 0;
          if (existing > 0) return existing;

          const personID =
            Number(
              localStorage.getItem("personID") ||
                localStorage.getItem("personId") ||
                localStorage.getItem("PersonID") ||
                "0",
            ) || 0;

          if (!personID)
            throw new Error("PersonID missing. Login again and try.");

          const c = await apiGet(ENDPOINTS.clientByPerson(personID));

          const clientID =
            Number(
              c?.clientId ?? c?.clientID ?? c?.ClientID ?? c?.id ?? c?.ID ?? 0,
            ) || 0;

          if (!clientID) {
            throw new Error(
              "Client not found for this PersonID (api/Client/ByPerson).",
            );
          }

          localStorage.setItem("clientID", String(clientID));

          const docId =
            Number(
              c?.documentationId ??
                c?.documentationID ??
                c?.DocumentationID ??
                0,
            ) || 0;
          if (docId) localStorage.setItem("documentationID", String(docId));

          return clientID;
        }

        /************************************************************
         * BookingTrip -> Ticket -> TicketFlights (ALL segments)
         ************************************************************/
        async function createBookingTrip() {
          const clientID = await ensureClientId();
          const tripTypeID =
            Number(sessionStorage.getItem("tripTypeID") || "1") || 1;

          const body = {
            clientID,
            tripTypeID: tripTypeID,
            tripType: tripTypeID,
            isActive: true,
            bookingDate: new Date().toISOString(),
          };

          const { data } = await apiPost(ENDPOINTS.createBookingTrip, body);

          const bookId = extractId(data, [
            "bookingTripID",
            "BookingTripID",
            "bookId",
            "bookID",
            "BookID",
            "id",
            "ID",
          ]);

          if (!bookId) {
            throw new Error(
              "BookingTrip created but BookingTripID not returned.",
            );
          }

          return bookId;
        }

        async function getOrCreateTicket(bookId) {
          try {
            const existing = await apiGet(ENDPOINTS.getTicketByBooking(bookId));
            if (Array.isArray(existing) && existing.length) {
              const tid = extractId(existing[0], [
                "ticketID",
                "TicketID",
                "ticketId",
                "TicketId",
                "id",
                "ID",
              ]);
              if (tid) return tid;
            } else if (existing && typeof existing === "object") {
              const tid = extractId(existing, [
                "ticketID",
                "TicketID",
                "ticketId",
                "TicketId",
                "id",
                "ID",
              ]);
              if (tid) return tid;
            }
          } catch {}

          const passengerClassID =
            Number(sessionStorage.getItem("passengerClassID") || "0") || 0;
          if (passengerClassID < 1) {
            throw new Error(
              "PassengerClassID missing. Go back and select class.",
            );
          }

          const passengersCount =
            Number(sessionStorage.getItem("totalPassengers") || "1") || 1;

          const body = {
            bookID: Number(bookId),
            passengerClassID,
            passengersCount,
            ticketPrice:
              Number(sessionStorage.getItem("flightTotal") || "0") || 0,
            isActive: true,
            createdAt: new Date().toISOString(),
          };

          const { data, res } = await apiPost(ENDPOINTS.createTicket, body);

          let ticketId = extractId(data, [
            "ticketID",
            "TicketID",
            "ticketId",
            "TicketId",
            "id",
            "ID",
          ]);

          if (!ticketId) {
            const loc =
              res.headers.get("Location") || res.headers.get("location") || "";
            const m = String(loc).match(/\/(\d+)\s*$/);
            if (m) ticketId = Number(m[1]);
          }

          if (!ticketId)
            throw new Error("Ticket created but TicketId not returned.");
          return ticketId;
        }

        // ✅ أهم تعديل: FlightType لازم يكون Outbound / Return / Leg ...
        function computeFlightType(tripType, index) {
          const t = String(tripType || "").toLowerCase();

          if (t.includes("round")) {
            return index === 0 ? "Outbound" : "Return";
          }

          if (t.includes("multi")) {
            return "Leg";
          }

          return "Outbound";
        }

        async function linkTicketToAllFlights(ticketId, tripType, schedules) {
          for (let i = 0; i < schedules.length; i++) {
            const s = schedules[i];
            const flightType = computeFlightType(tripType, i);

            const body = {
              ticketID: Number(ticketId),
              ticketId: Number(ticketId),
              flightScheduleID: Number(s.flightScheduleId),
              flightScheduleId: Number(s.flightScheduleId),
              flightType: flightType,
              FlightType: flightType,
            };

            await apiPost(ENDPOINTS.createTicketFlight, body);
          }
        }

        /************************************************************
         * MAIN LOAD
         ************************************************************/
        let ctx = {
          tripType: sessionStorage.getItem("tripType") || "OneWay",
          itinerary: null,
          schedules: [],
        };

        async function load() {
          setStatus("Loading selection...");
          try {
            const itinerary = readSelectedItinerary();
            if (!itinerary) {
              setStatus("No selection found. Go back and choose a flight.");
              return;
            }

            ctx.itinerary = itinerary;

            setStatus("Loading segments...");
            const schedules = await loadSchedulesForSegments(
              itinerary.segments || [],
            );
            if (!schedules.length) {
              throw new Error(
                "No segments could be loaded (missing flightScheduleId).",
              );
            }

            ctx.schedules = schedules;

            renderHeader(ctx.tripType, schedules);
            renderSegmentsList(ctx.tripType, schedules);
            await renderPriceForItinerary(itinerary, schedules);

            setStatus("Loaded ✅");
          } catch (e) {
            console.error(e);
            showError(e.message);
          }
        }

        /************************************************************
         * EVENTS
         ************************************************************/
        $("seatBtn")?.addEventListener("click", () => {
          const first = ctx.schedules?.[0];
          if (!first) return;
          window.location.href =
            "SeatMap.html?id=" +
            encodeURIComponent(String(first.flightScheduleId));
        });

        $("continueBtn")?.addEventListener("click", async () => {
          const btn = $("continueBtn");
          try {
            $("bookErr").style.display = "none";

            if (!ctx.schedules?.length) {
              throw new Error("No segments loaded. Go back and choose again.");
            }

            btn.disabled = true;
            btn.textContent = "Creating booking...";

            const bookId = await createBookingTrip();

            btn.textContent = "Creating ticket...";
            const ticketId = await getOrCreateTicket(bookId);

            btn.textContent = "Linking flights...";
            await linkTicketToAllFlights(ticketId, ctx.tripType, ctx.schedules);

            sessionStorage.setItem("bookId", String(bookId));
            sessionStorage.setItem("ticketId", String(ticketId));

            btn.textContent = "Redirecting...";
            window.location.href = `Doc.html?bookId=${encodeURIComponent(
              bookId,
            )}&ticketId=${encodeURIComponent(ticketId)}`;
          } catch (e) {
            console.error(e);
            showBookError(e.message);
            btn.disabled = false;
            btn.textContent = "Continue to Passenger Info";
          }
        });

        load();
      </script>
    </div>
  </body>
</html>
