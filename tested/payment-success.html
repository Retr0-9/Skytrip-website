<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Sky Trip • Payment Success</title>
    <style>
      :root {
        --bg: #efe7dc;
        --card: rgba(255, 255, 255, 0.88);
        --ink: #2b2b2b;
        --muted: rgba(43, 43, 43, 0.62);
        --line: rgba(0, 0, 0, 0.08);
        --shadow: 0 18px 40px rgba(0, 0, 0, 0.13);
        --radius: 18px;
        --brand: #8cc9d8;
        --bad: #b44b4b;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family:
          system-ui,
          -apple-system,
          Segoe UI,
          Roboto,
          Arial;
        color: var(--ink);
        background: radial-gradient(
          1100px 700px at 10% 0%,
          #fff 0%,
          var(--bg) 55%,
          #e8dccf 100%
        );
      }
      .wrap {
        max-width: 720px;
        margin: 60px auto;
        padding: 0 16px;
      }
      .card {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        padding: 22px;
        text-align: center;
      }
      .ok {
        width: 64px;
        height: 64px;
        border-radius: 999px;
        display: grid;
        place-items: center;
        margin: 0 auto 14px;
        background: rgba(140, 201, 216, 0.35);
        border: 1px solid rgba(140, 201, 216, 0.65);
        font-size: 30px;
      }
      h1 {
        margin: 8px 0 6px;
      }
      p {
        margin: 0;
        color: var(--muted);
      }
      .ref {
        margin-top: 16px;
        padding: 14px;
        border-radius: 14px;
        border: 1px dashed rgba(0, 0, 0, 0.12);
        background: rgba(255, 255, 255, 0.55);
      }
      .row {
        margin-top: 10px;
        color: rgba(43, 43, 43, 0.62);
        font-size: 13px;
      }
      .val {
        font-weight: 800;
        font-size: 22px;
        margin-top: 4px;
        color: var(--ink);
      }
      .hint {
        margin-top: 12px;
        font-size: 13px;
        color: var(--muted);
      }
      .hint strong {
        color: var(--ink);
      }
      .btn {
        margin-top: 16px;
        display: inline-block;
        padding: 12px 18px;
        border-radius: 999px;
        background: linear-gradient(135deg, var(--brand), #cfe8ef);
        color: #0f2b31;
        font-weight: 800;
        text-decoration: none;
      }
      .btn.secondary {
        background: rgba(255, 255, 255, 0.7);
        border: 1px solid rgba(0, 0, 0, 0.12);
        color: var(--ink);
      }
      .error {
        margin-top: 12px;
        color: var(--bad);
        font-weight: 700;
        font-size: 13px;
        display: none;
      }
    </style>
  </head>

  <body>
    <div class="wrap">
      <div class="card">
        <div class="ok">✓</div>
        <h1>Payment successful</h1>
        <p id="subtitle">Your booking is being confirmed…</p>

        <div class="ref">
          <div class="row">Ticket ID</div>
          <div id="ticketId" class="val">—</div>

          <div class="row">Book ID</div>
          <div id="bookId" class="val">—</div>

          <div class="row">Payment Status</div>
          <div id="payStatus" class="val">Checking…</div>

          <div class="row">Booking reference (if available)</div>
          <div id="ref" class="val">—</div>

          <div class="hint" id="hint">
            We’re waiting for the server to confirm your booking. This usually
            takes a few seconds.
          </div>

          <div class="error" id="errLine"></div>
        </div>

        <a
          id="goTicketsBtn"
          class="btn"
          href="Ticket.html"
          style="display: none"
          >Go to My Tickets</a
        >
        <a id="retryBtn" class="btn secondary" href="#" style="display: none"
          >Retry</a
        >
      </div>
    </div>

    <script>
      /************************************************************
       * ✅ payment-success.html
       * - polls GET /api/payments/my/status/{ticketId}
       * - supports token keys: auth_token OR token
       * - if unauthorized -> redirect login (NO random logout)
       ************************************************************/

      const API_BASE =
        "https://bookingtrip-api-2026-cyh0f4dhfednh3fj.westeurope-01.azurewebsites.net";
      const $ = (id) => document.getElementById(id);

      function qs(name) {
        return new URLSearchParams(location.search).get(name);
      }

      function getToken() {
        return (
          localStorage.getItem("auth_token") ||
          localStorage.getItem("token") ||
          ""
        );
      }

      function goLogin() {
        window.location.href = "Login.html";
      }

      async function apiGet(path) {
        const headers = { Accept: "application/json" };
        const token = getToken();
        if (token) headers.Authorization = `Bearer ${token}`;

        const res = await fetch(API_BASE + path, {
          headers,
          cache: "no-store",
        });

        const text = await res.text().catch(() => "");
        let body = null;
        try {
          body = text ? JSON.parse(text) : null;
        } catch {
          body = text;
        }

        if (!res.ok) {
          const msg =
            (body &&
              typeof body === "object" &&
              (body.detail || body.title || body.message)) ||
            (typeof body === "string" && body) ||
            `HTTP ${res.status}`;

          const err = new Error(msg);
          err.status = res.status;
          err.body = body;
          throw err;
        }

        return body;
      }

      function showError(msg) {
        if (!$("errLine")) return;
        $("errLine").style.display = "block";
        $("errLine").textContent = msg;
      }

      function clearError() {
        if (!$("errLine")) return;
        $("errLine").style.display = "none";
        $("errLine").textContent = "";
      }

      function showButtons(showGoTickets, showRetry) {
        if ($("goTicketsBtn"))
          $("goTicketsBtn").style.display = showGoTickets
            ? "inline-block"
            : "none";
        if ($("retryBtn"))
          $("retryBtn").style.display = showRetry ? "inline-block" : "none";
      }

      function isConfirmedStatus(s) {
        const paid =
          String(s?.paymentStatus || s?.PaymentStatus || "")
            .trim()
            .toLowerCase() === "paid";

        const confirmed =
          s?.isConfirmed === true || Number(s?.isConfirmed) === 1;

        return paid || confirmed;
      }

      async function pollStatus(ticketId) {
        clearError();
        showButtons(false, false);

        if ($("payStatus")) $("payStatus").textContent = "Checking…";
        if ($("subtitle"))
          $("subtitle").textContent = "Your booking is being confirmed…";

        const maxMs = 25000; // 25s
        const intervalMs = 1500; // 1.5s
        const start = Date.now();

        while (Date.now() - start < maxMs) {
          try {
            const s = await apiGet(
              `/api/payments/my/status/${encodeURIComponent(ticketId)}`,
            );

            // Fill UI if elements exist
            if ($("bookId"))
              $("bookId").textContent = s.bookID ?? s.bookId ?? "—";
            if ($("payStatus"))
              $("payStatus").textContent =
                s.paymentStatus ?? s.PaymentStatus ?? "—";
            if ($("ref"))
              $("ref").textContent =
                s.bookingReference ?? s.BookingReference ?? "—";

            if (isConfirmedStatus(s)) {
              if ($("subtitle"))
                $("subtitle").textContent =
                  "Booking confirmed ✅ Redirecting to your tickets…";
              showButtons(true, false);

              setTimeout(() => {
                window.location.href = "Ticket.html";
              }, 900);

              return;
            }
          } catch (e) {
            console.error(e);

            // ✅ if token missing/expired => go login
            if (e.status === 401 || e.status === 403) {
              showError("Session expired. Please login again.");
              setTimeout(goLogin, 700);
              return;
            }

            // not fatal: keep polling
            showError("Couldn’t verify payment yet: " + (e.message || "Error"));
          }

          await new Promise((r) => setTimeout(r, intervalMs));
        }

        // timeout
        if ($("subtitle"))
          $("subtitle").textContent =
            "Payment received. Confirmation may take a bit longer. You can retry or go to tickets.";
        showButtons(true, true);
      }

      (function init() {
        const ticketId = Number(qs("ticketId") || "0");

        if ($("ticketId"))
          $("ticketId").textContent = ticketId ? String(ticketId) : "—";

        if (!ticketId) {
          if ($("subtitle"))
            $("subtitle").textContent = "Missing ticketId in URL.";
          showError(
            "Open this page from the Stripe success redirect (ticketId is required).",
          );
          showButtons(true, false);
          return;
        }

        if (!getToken()) {
          showError("Missing token. Please login first.");
          setTimeout(goLogin, 600);
          return;
        }

        $("retryBtn")?.addEventListener("click", (e) => {
          e.preventDefault();
          pollStatus(ticketId);
        });

        pollStatus(ticketId);
      })();
    </script>
  </body>
</html>
