<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <link rel="stylesheet" href="shared-header.css" />
    <script src="shared-header.js" defer></script>
    <title>Sky Trip • Available Flights</title>

    <style>
      :root {
        /* Base Colors - Modern Theme */
        --bg: #f4f4fb;
        --ink: #0f172a;
        --muted: rgba(100, 116, 139, 1);
        --line: rgba(148, 163, 184, 0.35);

        /* Accent Palette */
        --blue: #38bdf8;
        --blueInk: #0f172a;
        --coral: #fb7185;
        --purple: #a855f7;
        --green: #22c55e;
        --yellow: #facc15;

        /* Shadows */
        --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.04);
        --shadow: 0 8px 30px rgba(0, 0, 0, 0.08);
        --shadow-lg: 0 20px 60px rgba(0, 0, 0, 0.12);
        --shadow-xl: 0 30px 80px rgba(0, 0, 0, 0.15);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          "Helvetica Neue", Arial, sans-serif;
        color: var(--ink);
        background:
          radial-gradient(
            circle at 0% 0%,
            rgba(56, 189, 248, 0.24) 0%,
            transparent 55%
          ),
          radial-gradient(
            circle at 100% 100%,
            rgba(168, 85, 247, 0.2) 0%,
            transparent 55%
          ),
          linear-gradient(180deg, #f9fafb 0%, #eef2ff 40%, #e0f2fe 100%);
        background-attachment: fixed;
        min-height: 100vh;
        position: relative;
        overflow-x: hidden;
      }

      /* Animated Background Overlay */
      body::before {
        content: "";
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background:
          radial-gradient(
            circle at 30% 30%,
            rgba(255, 255, 255, 0.4) 0%,
            transparent 40%
          ),
          radial-gradient(
            circle at 70% 70%,
            rgba(156, 214, 230, 0.2) 0%,
            transparent 40%
          );
        pointer-events: none;
        z-index: 0;
        animation: breathe 8s ease-in-out infinite;
      }

      @keyframes breathe {
        0%,
        100% {
          opacity: 0.6;
          transform: scale(1);
        }
        50% {
          opacity: 0.8;
          transform: scale(1.05);
        }
      }

      main {
        max-width: 1200px;
        margin: 0 auto;
        padding: 30px 20px 60px;
        position: relative;
        z-index: 1;
        animation: fadeInUp 0.6s ease-out;
      }

      @keyframes fadeInUp {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .top {
        display: flex;
        align-items: flex-end;
        justify-content: space-between;
        gap: 16px;
        flex-wrap: wrap;
        margin-bottom: 24px;
        animation: fadeIn 0.8s ease-out 0.2s both;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }

      .title h2 {
        margin: 0;
        font-size: 32px;
        font-weight: 900;
        letter-spacing: -1px;
        background: linear-gradient(
          135deg,
          var(--blueInk),
          var(--blue),
          var(--purple)
        );
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .title p {
        margin: 8px 0 0;
        color: var(--muted);
        font-weight: 600;
        font-size: 14px;
      }

      .pill {
        display: inline-flex;
        gap: 10px;
        align-items: center;
        padding: 12px 18px;
        border-radius: 999px;
        background: linear-gradient(
          135deg,
          rgba(255, 255, 255, 0.95),
          rgba(255, 255, 255, 0.85)
        );
        backdrop-filter: blur(10px);
        border: 1px solid rgba(156, 214, 230, 0.3);
        font-weight: 800;
        font-size: 13px;
        box-shadow: var(--shadow);
        color: var(--ink);
      }

      .grid {
        display: grid;
        grid-template-columns: 1.6fr 1fr;
        gap: 20px;
        animation: fadeIn 0.8s ease-out 0.3s both;
      }

      @media (max-width: 1000px) {
        .grid {
          grid-template-columns: 1fr;
        }
      }

      .card {
        background: linear-gradient(
          135deg,
          rgba(255, 255, 255, 0.95),
          rgba(255, 255, 255, 0.85)
        );
        border-radius: 24px;
        box-shadow: var(--shadow-lg);
        backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.9);
        padding: 20px;
        position: relative;
        overflow: hidden;
        transition: all 0.3s ease;
      }

      .card:hover {
        box-shadow: var(--shadow-xl);
        transform: translateY(-2px);
      }

      /* Card Rotating Gradient Background */
      .card::before {
        content: "";
        position: absolute;
        top: -50%;
        right: -50%;
        width: 200%;
        height: 200%;
        background: radial-gradient(
          circle,
          rgba(156, 214, 230, 0.08) 0%,
          transparent 70%
        );
        animation: rotate 20s linear infinite;
        pointer-events: none;
      }

      @keyframes rotate {
        from {
          transform: rotate(0deg);
        }
        to {
          transform: rotate(360deg);
        }
      }

      .list {
        display: grid;
        gap: 16px;
        position: relative;
        z-index: 1;
      }

      .flight {
        padding: 20px;
        border-radius: 20px;
        border: 2px solid rgba(156, 214, 230, 0.2);
        background: linear-gradient(
          135deg,
          rgba(255, 255, 255, 0.9),
          rgba(255, 255, 255, 0.7)
        );
        display: grid;
        gap: 16px;
        transition: all 0.3s ease;
        position: relative;
        overflow: hidden;
      }

      .flight::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        width: 4px;
        height: 100%;
        background: linear-gradient(135deg, var(--blue), var(--purple));
        opacity: 0;
        transition: opacity 0.3s ease;
      }

      .flight:hover {
        border-color: var(--blue);
        box-shadow: 0 8px 24px rgba(156, 214, 230, 0.3);
        transform: translateX(4px);
      }

      .flight:hover::before {
        opacity: 1;
      }

      .f-top {
        display: flex;
        justify-content: space-between;
        gap: 16px;
        flex-wrap: wrap;
        align-items: flex-start;
      }

      .route {
        display: flex;
        gap: 12px;
        align-items: center;
        font-weight: 900;
        font-size: 18px;
        color: var(--ink);
        letter-spacing: -0.5px;
      }

      .route .dot {
        width: 12px;
        height: 12px;
        border-radius: 50%;
        background: linear-gradient(135deg, var(--blue), var(--purple));
        box-shadow: 0 4px 12px rgba(156, 214, 230, 0.5);
        animation: pulse 2s ease-in-out infinite;
      }

      @keyframes pulse {
        0%,
        100% {
          transform: scale(1);
          opacity: 1;
        }
        50% {
          transform: scale(1.2);
          opacity: 0.8;
        }
      }

      .sub {
        color: var(--muted);
        font-size: 13px;
        font-weight: 700;
        margin-top: 6px;
      }

      .price {
        text-align: right;
      }

      .price strong {
        display: block;
        font-size: 28px;
        font-weight: 900;
        background: linear-gradient(135deg, var(--blue), var(--purple));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        letter-spacing: -1px;
      }

      .price span {
        display: block;
        font-size: 12px;
        color: var(--muted);
        font-weight: 700;
        margin-top: 4px;
      }

      .meta {
        display: grid;
        gap: 10px;
      }

      .m {
        padding: 12px 14px;
        border-radius: 14px;
        border: 1px solid rgba(156, 214, 230, 0.2);
        background: rgba(255, 255, 255, 0.5);
        transition: all 0.2s ease;
      }

      .m:hover {
        background: rgba(156, 214, 230, 0.1);
        border-color: var(--blue);
      }

      .m b {
        display: block;
        font-size: 13px;
        font-weight: 800;
        color: var(--ink);
      }

      .m small {
        display: block;
        font-size: 12px;
        color: var(--muted);
        font-weight: 600;
        margin-top: 6px;
        line-height: 1.4;
      }

      .actions {
        display: flex;
        justify-content: flex-end;
        gap: 10px;
        flex-wrap: wrap;
      }

      .btn {
        border: 2px solid rgba(0, 0, 0, 0.08);
        background: white;
        padding: 12px 20px;
        border-radius: 14px;
        cursor: pointer;
        font-weight: 800;
        font-size: 13px;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        box-shadow: var(--shadow-sm);
        position: relative;
        overflow: hidden;
        color: var(--ink);
      }

      .btn::before {
        content: "";
        position: absolute;
        top: 50%;
        left: 50%;
        width: 0;
        height: 0;
        border-radius: 50%;
        background: rgba(156, 214, 230, 0.3);
        transform: translate(-50%, -50%);
        transition:
          width 0.6s,
          height 0.6s;
      }

      .btn:hover::before {
        width: 300px;
        height: 300px;
      }

      .btn:hover {
        transform: translateY(-2px);
        box-shadow: var(--shadow);
        border-color: rgba(156, 214, 230, 0.4);
      }

      .btn.primary {
        border: 0;
        color: var(--blueInk);
        background: linear-gradient(135deg, var(--blue), #7ec8db);
        box-shadow: 0 8px 20px rgba(156, 214, 230, 0.4);
      }

      .btn.primary:hover {
        box-shadow: 0 12px 30px rgba(156, 214, 230, 0.5);
      }

      .side {
        position: relative;
        z-index: 1;
      }

      .side h3 {
        margin: 0 0 16px;
        font-size: 18px;
        font-weight: 900;
        color: var(--ink);
        letter-spacing: -0.5px;
      }

      .kv {
        display: grid;
        gap: 12px;
      }

      .kv .row {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        font-weight: 800;
        font-size: 13px;
        color: var(--ink);
        padding: 10px 12px;
        border-radius: 12px;
        background: rgba(156, 214, 230, 0.08);
        transition: all 0.2s ease;
      }

      .kv .row:hover {
        background: rgba(156, 214, 230, 0.15);
        transform: translateX(2px);
      }

      .kv .row span:last-child {
        color: var(--muted);
        font-weight: 700;
        text-align: right;
      }

      .empty {
        padding: 40px 24px;
        border-radius: 20px;
        border: 2px dashed rgba(156, 214, 230, 0.4);
        color: var(--muted);
        font-weight: 700;
        background: linear-gradient(
          135deg,
          rgba(255, 255, 255, 0.6),
          rgba(255, 255, 255, 0.4)
        );
        text-align: center;
        font-size: 14px;
        position: relative;
        z-index: 1;
      }

      /* Responsive */
      @media (max-width: 600px) {
        .title h2 {
          font-size: 26px;
        }

        .route {
          font-size: 16px;
        }

        .price strong {
          font-size: 24px;
        }

        .f-top {
          flex-direction: column;
        }

        .price {
          text-align: left;
        }

        .actions {
          justify-content: flex-start;
        }
      }
    </style>
  </head>

  <body>
    <header class="stickyHeader" data-active-tab="book">
      <div class="hTop">
        <div class="hBrand">
          <div class="hBadge" aria-hidden="true">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
              <path
                d="M21 16.5L13 13V21L11 20L9 21V13L3 10.5V8.5L9 10V3.5C9 2.7 9.7 2 10.5 2H13.5C14.3 2 15 2.7 15 3.5V10L21 8.5V16.5Z"
                fill="currentColor"
              />
            </svg>
          </div>
          <div>
            <h1>Sky Trip</h1>
            <p id="miniStatus">Results</p>
          </div>
        </div>
      </div>

      <div class="hTabsWrap">
        <div class="hTabs" id="tabs">
          <div class="hIndicator" id="indicator"></div>
          <button class="hTab" data-tab="home">
            <span>⌂</span><span>Home</span>
          </button>
          <button class="hTab active" data-tab="book">
            <span>✈</span><span>Book</span>
          </button>
          <button class="hTab" data-tab="tickets">
            <span>🎟</span><span>Tickets</span>
          </button>
          <button class="hTab" data-tab="profile">
            <span>👤</span><span>Profile</span>
          </button>
        </div>
      </div>
    </header>

    <main>
      <div class="top">
        <div class="title">
          <h2>Available Flights</h2>
          <p id="subtitle">Showing search results</p>
        </div>
        <div class="pill" id="pillInfo">—</div>
      </div>

      <div class="grid">
        <div class="card">
          <div class="list" id="list"></div>
          <div class="empty" id="empty" style="display: none">
            No flights found. Go back and try different dates/cities.
          </div>
        </div>

        <div class="card side">
          <h3>Search Summary</h3>
          <div class="kv" id="summary"></div>

          <div
            style="
              margin-top: 20px;
              display: flex;
              gap: 10px;
              flex-wrap: wrap;
              position: relative;
              z-index: 1;
            "
          >
            <button class="btn" id="backBtn">← Back</button>
            <button class="btn" id="clearBtn">Clear Results</button>
          </div>
        </div>
      </div>
    </main>

    <script>
      function safeJsonParse(v, fallback) {
        try {
          return JSON.parse(v);
        } catch {
          return fallback;
        }
      }

      const endpointUsed = sessionStorage.getItem("endpointUsed") || "";
      const payload = safeJsonParse(
        sessionStorage.getItem("searchPayload") || "null",
        null,
      );
      const rawResults = safeJsonParse(
        sessionStorage.getItem("searchResults") || "null",
        null,
      );

      const paxCount =
        Number(sessionStorage.getItem("totalPassengers") || "1") || 1;
      const classFee =
        Number(sessionStorage.getItem("selectedClassFee") || "0") || 0;
      const className = sessionStorage.getItem("selectedClassName") || "—";

      const listEl = document.getElementById("list");
      const emptyEl = document.getElementById("empty");
      const subtitleEl = document.getElementById("subtitle");
      const pillInfo = document.getElementById("pillInfo");
      const summaryEl = document.getElementById("summary");

      function inferTripTypeFromEndpoint(ep) {
        const s = String(ep || "").toLowerCase();
        if (s.includes("/multicity")) return "MultiCity";
        if (s.includes("/roundtrip")) return "RoundTrip";
        if (s.includes("/oneway")) return "OneWay";
        return "Unknown";
      }

      function fmtDateLike(v) {
        if (!v) return "—";
        const s = String(v);
        return s.includes("T") ? s.split("T")[0] : s;
      }

      function fmtTimeLike(v) {
        if (!v) return "—";
        const s = String(v);
        if (s.includes("T")) return (s.split("T")[1] || "").slice(0, 5) || s;
        return s.slice(0, 5);
      }

      function money(v) {
        const n = Number(v);
        if (Number.isNaN(n)) return "—";
        return n.toFixed(2);
      }

      function normalizeResults(r) {
        const base = r?.data ?? r?.result ?? r;

        // ✅ expected: { tripType, itineraries }
        const itArr = base?.itineraries ?? base?.Itineraries ?? null;
        const tt = base?.tripType ?? base?.TripType ?? null;

        if (Array.isArray(itArr)) {
          return {
            tripType: tt || inferTripTypeFromEndpoint(endpointUsed),
            itineraries: itArr,
          };
        }

        // if stored itineraries only
        if (
          Array.isArray(base) &&
          (base.length === 0 ||
            (base[0] && (base[0].segments || base[0].Segments)))
        ) {
          return {
            tripType: inferTripTypeFromEndpoint(endpointUsed),
            itineraries: base.map((x) => ({
              totalPrice: x.totalPrice ?? x.TotalPrice ?? 0,
              segments: x.segments ?? x.Segments ?? [],
            })),
          };
        }

        // fallback
        return {
          tripType: inferTripTypeFromEndpoint(endpointUsed),
          itineraries: [],
        };
      }

      function computeTotal(it) {
        if (it.totalPrice != null) return Number(it.totalPrice) || 0;
        const segs = Array.isArray(it.segments) ? it.segments : [];
        const baseSum = segs.reduce(
          (sum, s) => sum + (Number(s.basePrice) || 0),
          0,
        );
        return (baseSum + classFee * segs.length) * paxCount;
      }

      function itineraryTemplate(it, index) {
        const segs = (it.segments ?? it.Segments ?? []).map((s) => ({
          flightScheduleId: s.flightScheduleId ?? s.FlightScheduleId ?? null,
          from: s.from ?? s.From ?? "—",
          to: s.to ?? s.To ?? "—",
          date: s.date ?? s.flightDate ?? s.FlightDate ?? "",
          basePrice: s.basePrice ?? s.BasePrice ?? 0,
          departureTime: s.departureTime ?? s.DepartureTime ?? "",
          arrivalTime: s.arrivalTime ?? s.ArrivalTime ?? "",
        }));

        const total = computeTotal({ ...it, segments: segs });
        const start = segs[0];
        const end = segs[segs.length - 1];
        const route = start && end ? `${start.from} → ${end.to}` : "—";

        const segmentsHtml = segs
          .map(
            (s) => `
          <div class="m">
            <b>${s.from} → ${s.to}</b>
            <small>${fmtDateLike(s.date)} • ${fmtTimeLike(s.departureTime)} → ${fmtTimeLike(s.arrivalTime)} • Base: ${money(s.basePrice)}</small>
          </div>
        `,
          )
          .join("");

        return `
          <div class="flight">
            <div class="f-top">
              <div>
                <div class="route"><span class="dot"></span><span>${route}</span></div>
                <div class="sub">${segs.length} segment(s)</div>
              </div>

              <div class="price">
                <strong>${money(total)}</strong>
                <span>Total itinerary price</span>
              </div>
            </div>

            <div class="meta">${segmentsHtml}</div>

            <div class="actions">
              <button class="btn" data-act="details" data-i="${index}">Details</button>
              <button class="btn primary" data-act="select" data-i="${index}">Select</button>
            </div>
          </div>
        `;
      }

      function buildSummary(tripType, count) {
        const rows = [
          ["Trip Type", tripType],
          ["Passengers", String(paxCount)],
          ["Class", `${className} (+${money(classFee)}) / pax`],
          ["Endpoint", endpointUsed || "—"],
          ["Payload", payload ? "Stored in sessionStorage" : "—"],
        ];

        summaryEl.innerHTML = rows
          .map(
            ([k, v]) =>
              `<div class="row"><span>${k}</span><span>${v}</span></div>`,
          )
          .join("");
        pillInfo.textContent = `${count} option(s) • ${paxCount} pax • ${className}`;
        subtitleEl.textContent = `Trip: ${tripType} • Using: ${endpointUsed || "—"}`;
      }

      function showDetails(obj) {
        const pretty = JSON.stringify(obj, null, 2);
        alert(
          pretty.length > 1200
            ? pretty.slice(0, 1200) + "\n...\n(Truncated)"
            : pretty,
        );
      }

      function onSelectItinerary(it) {
        const segs = it.segments ?? it.Segments ?? [];
        const ids = segs
          .map((s) => s.flightScheduleId ?? s.FlightScheduleId ?? null)
          .filter((x) => x != null);

        sessionStorage.setItem("selectedItinerary", JSON.stringify(it));
        sessionStorage.setItem(
          "selectedFlightScheduleIds",
          JSON.stringify(ids),
        );

        window.location.assign("FlightDetails.html");
      }

      function render() {
        const normalized = normalizeResults(rawResults);
        const tripType = normalized.tripType || "Unknown";
        const itineraries = normalized.itineraries || [];

        buildSummary(tripType, itineraries.length);

        if (!itineraries.length) {
          listEl.innerHTML = "";
          emptyEl.style.display = "block";
          return;
        }

        emptyEl.style.display = "none";
        listEl.innerHTML = itineraries
          .map((it, i) => itineraryTemplate(it, i))
          .join("");

        listEl.addEventListener("click", (e) => {
          const btn = e.target.closest("button[data-act]");
          if (!btn) return;
          const i = Number(btn.getAttribute("data-i"));
          const it = itineraries[i];
          if (!it) return;
          const act = btn.getAttribute("data-act");
          if (act === "details") showDetails(it);
          if (act === "select") onSelectItinerary(it);
        });
      }

      render();

      document
        .getElementById("backBtn")
        .addEventListener("click", () => history.back());
      document.getElementById("clearBtn").addEventListener("click", () => {
        sessionStorage.removeItem("searchResults");
        sessionStorage.removeItem("searchPayload");
        sessionStorage.removeItem("endpointUsed");
        sessionStorage.removeItem("selectedItinerary");
        sessionStorage.removeItem("selectedFlightScheduleIds");
        location.reload();
      });
    </script>
  </body>
</html>
