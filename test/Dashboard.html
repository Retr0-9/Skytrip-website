<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard</title>
    <style>
      :root {
        --bg: #f3f2ef;
        --card: #fff;
        --text: #2b2b2b;
        --muted: #6f6f6f;
        --border: #eadfdb;
        --shadow: 0 16px 40px rgba(0, 0, 0, 0.08);
        --primary: #9fd3e3;
        --primary-dark: #7dc0d6;
        --danger: #ff6b6b;
        --success-bg: #effdf6;
        --success-b: #bff1d7;
        --success-t: #1f7a4d;
        --error-bg: #fff1f1;
        --error-b: #ffd2d2;
        --error-t: #9b2c2c;
        --radius: 22px;
      }

      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family:
          system-ui,
          -apple-system,
          Segoe UI,
          Roboto,
          Arial,
          "Noto Sans",
          sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .card {
        width: min(920px, 100%);
        background: var(--card);
        border-radius: 26px;
        box-shadow: var(--shadow);
        padding: 22px;
      }

      .top {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 12px;
      }

      h1 {
        font-size: 22px;
        margin: 0 0 6px;
        font-weight: 800;
      }

      .pill {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        font-size: 13px;
        padding: 8px 12px;
        border-radius: 999px;
        background: var(--success-bg);
        border: 1px solid var(--success-b);
        color: var(--success-t);
        font-weight: 700;
        width: fit-content;
      }

      .actions {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        justify-content: flex-end;
      }

      .btn {
        border: 0;
        border-radius: 14px;
        padding: 10px 14px;
        cursor: pointer;
        font-weight: 800;
        transition:
          transform 0.05s ease,
          opacity 0.2s,
          background 0.2s;
        user-select: none;
      }
      .btn:active {
        transform: translateY(1px);
      }
      .btn-primary {
        background: var(--primary);
        color: #fff;
      }
      .btn-primary:hover {
        background: var(--primary-dark);
      }
      .btn-ghost {
        background: #fff;
        border: 1px solid var(--border);
        color: var(--text);
      }
      .btn-danger {
        background: #fff;
        border: 1px solid #ffd2d2;
        color: #b42318;
      }
      .btn-danger:hover {
        opacity: 0.9;
      }

      .toolbar {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        align-items: center;
        margin-top: 10px;
        padding-top: 14px;
        border-top: 1px solid rgba(0, 0, 0, 0.08);
      }

      .search {
        flex: 1;
        min-width: 220px;
        height: 42px;
        border-radius: 14px;
        border: 1px solid var(--border);
        padding: 0 12px;
        outline: none;
        background: #fbfbfb;
      }
      .search:focus {
        background: #fff;
        box-shadow: 0 0 0 4px rgba(159, 211, 227, 0.25);
        border-color: #c8e4ef;
      }

      .meta {
        color: var(--muted);
        font-size: 13px;
        margin-left: auto;
        font-weight: 700;
      }

      .message {
        display: none;
        margin-top: 12px;
        padding: 10px 12px;
        border-radius: 14px;
        font-size: 13px;
        line-height: 1.35;
        font-weight: 650;
      }
      .message.error {
        background: var(--error-bg);
        border: 1px solid var(--error-b);
        color: var(--error-t);
      }
      .message.success {
        background: var(--success-bg);
        border: 1px solid var(--success-b);
        color: var(--success-t);
      }

      .table-wrap {
        margin-top: 14px;
        border: 1px solid rgba(0, 0, 0, 0.08);
        border-radius: 18px;
        overflow: hidden;
        background: #fff;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 13px;
      }

      thead th {
        text-align: left;
        padding: 12px 12px;
        background: #fafafa;
        border-bottom: 1px solid rgba(0, 0, 0, 0.08);
        font-size: 12px;
        letter-spacing: 0.2px;
        color: #555;
        font-weight: 900;
      }

      tbody td {
        padding: 12px 12px;
        border-bottom: 1px solid rgba(0, 0, 0, 0.06);
        vertical-align: top;
        color: #2f2f2f;
      }

      tbody tr:hover {
        background: #fcfcfc;
      }

      .chip {
        display: inline-flex;
        align-items: center;
        padding: 4px 10px;
        border-radius: 999px;
        font-weight: 800;
        font-size: 12px;
        border: 1px solid rgba(0, 0, 0, 0.1);
        background: #fff;
      }

      .nowrap {
        white-space: nowrap;
      }
      .mono {
        font-family:
          ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas,
          "Liberation Mono", monospace;
        font-size: 12px;
      }
      .small {
        font-size: 12px;
        color: var(--muted);
      }

      @media (max-width: 700px) {
        .hide-mobile {
          display: none;
        }
        .meta {
          width: 100%;
          margin-left: 0;
        }
        .top {
          flex-direction: column;
        }
        .actions {
          justify-content: flex-start;
        }
      }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="top">
        <div>
          <h1>Dashboard</h1>
          <div class="pill" id="authPill">Authenticated ✅</div>
        </div>

        <div class="actions">
          <button class="btn btn-primary" id="loadBtn">Load UserAccount</button>
          <button class="btn btn-danger" id="logoutBtn">Logout</button>
        </div>
      </div>

      <div class="toolbar">
        <input
          class="search"
          id="searchInput"
          placeholder="Search by email / userId / roleId..."
        />
        <div class="meta" id="metaText">Status: —</div>
      </div>

      <div class="message error" id="errorBox"></div>
      <div class="message success" id="successBox"></div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th class="nowrap">UserID</th>
              <th class="nowrap">ClientID</th>
              <th>Email</th>
              <th class="nowrap">RoleID</th>
              <th class="hide-mobile">IsActive</th>
              <th class="hide-mobile">CreatedAt</th>
              <th class="hide-mobile">LastLoginAt</th>
            </tr>
          </thead>
          <tbody id="tbody">
            <tr>
              <td colspan="7" class="small">
                No data yet. Click “Load UserAccount”.
              </td>
            </tr>
          </tbody>
        </table>
      </div>

      <p class="small" style="margin-top: 10px">
        Note: For security, you should not expose <b>PasswordHash</b> in APIs.
        Consider removing it from the response.
      </p>
    </main>

    <script>
      // ====== CONFIG ======
      const API_BASE_URL = "https://localhost:7216"; // <-- عدّلها إذا لزم
      const USERACCOUNT_ENDPOINT = "/api/UserAccount";

      // ====== AUTH GUARD ======
      const token = localStorage.getItem("auth_token");
      if (!token) window.location.href = "login.html";

      // ====== DOM ======
      const loadBtn = document.getElementById("loadBtn");
      const logoutBtn = document.getElementById("logoutBtn");
      const tbody = document.getElementById("tbody");
      const metaText = document.getElementById("metaText");
      const searchInput = document.getElementById("searchInput");
      const errorBox = document.getElementById("errorBox");
      const successBox = document.getElementById("successBox");

      let rawData = [];

      function showError(msg) {
        successBox.style.display = "none";
        errorBox.textContent = msg;
        errorBox.style.display = "block";
      }
      function showSuccess(msg) {
        errorBox.style.display = "none";
        successBox.textContent = msg;
        successBox.style.display = "block";
      }
      function clearMessages() {
        errorBox.style.display = "none";
        successBox.style.display = "none";
      }

      function formatDate(value) {
        if (!value) return "—";
        const d = new Date(value);
        if (Number.isNaN(d.getTime())) return String(value);
        return d.toLocaleString();
      }

      function safe(value) {
        return value === null || value === undefined || value === ""
          ? "—"
          : value;
      }

      function renderTable(data) {
        if (!Array.isArray(data) || data.length === 0) {
          tbody.innerHTML = `<tr><td colspan="7" class="small">No rows.</td></tr>`;
          return;
        }

        tbody.innerHTML = data
          .map((row) => {
            const isActive =
              row.isActive === true
                ? "Yes"
                : row.isActive === false
                  ? "No"
                  : safe(row.isActive);
            return `
          <tr>
            <td class="mono nowrap">${safe(row.userID)}</td>
            <td class="mono nowrap">${safe(row.clientID)}</td>
            <td>
              <div style="font-weight:900;">${safe(row.userNameOrEmail)}</div>
              <div class="small mono">ID: ${safe(row.userID)}</div>
            </td>
            <td class="nowrap"><span class="chip">Role ${safe(row.roleID)}</span></td>
            <td class="hide-mobile">${isActive}</td>
            <td class="hide-mobile">${formatDate(row.createdAt)}</td>
            <td class="hide-mobile">${formatDate(row.lastLoginAt)}</td>
          </tr>
        `;
          })
          .join("");
      }

      function applySearch() {
        const q = searchInput.value.trim().toLowerCase();
        if (!q) {
          renderTable(rawData);
          return;
        }

        const filtered = rawData.filter((r) => {
          return (
            String(r.userID ?? "")
              .toLowerCase()
              .includes(q) ||
            String(r.clientID ?? "")
              .toLowerCase()
              .includes(q) ||
            String(r.roleID ?? "")
              .toLowerCase()
              .includes(q) ||
            String(r.userNameOrEmail ?? "")
              .toLowerCase()
              .includes(q)
          );
        });

        renderTable(filtered);
      }

      async function loadUserAccounts() {
        clearMessages();
        metaText.textContent = "Status: loading...";

        try {
          const res = await fetch(API_BASE_URL + USERACCOUNT_ENDPOINT, {
            method: "GET",
            headers: {
              Authorization: `Bearer ${localStorage.getItem("auth_token")}`,
              Accept: "application/json",
            },
          });

          metaText.textContent = `Status: ${res.status}`;

          const text = await res.text();
          const data = (() => {
            try {
              return JSON.parse(text);
            } catch {
              return null;
            }
          })();

          if (!res.ok) {
            showError(
              data?.title || data?.message || text || "Request failed.",
            );
            return;
          }

          // API يرجّع array
          rawData = Array.isArray(data) ? data : (data?.data ?? []);
          renderTable(rawData);
          showSuccess(`Loaded ${rawData.length} users ✅`);
        } catch (e) {
          showError("Network error while loading /api/UserAccount.");
          metaText.textContent = "Status: —";
        }
      }

      loadBtn.addEventListener("click", loadUserAccounts);

      logoutBtn.addEventListener("click", () => {
        localStorage.removeItem("auth_token");
        window.location.href = "login.html";
      });

      searchInput.addEventListener("input", applySearch);

      // تحميل تلقائي أول ما تفتح الصفحة (اختياري)
      loadUserAccounts();
    </script>
  </body>
</html>
