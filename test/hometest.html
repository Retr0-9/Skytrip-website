<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <link rel="stylesheet" href="shared-header.css" />
    <script src="shared-header.js" defer></script>
    <title>Sky Trip - Home</title>

    <style>
      :root {
        --bg: #ede0d4;
        --card: #ffffffcc;
        --text: #2b2b2b;
        --muted: rgba(43, 43, 43, 0.65);
        --line: rgba(0, 0, 0, 0.08);
        --shadow: 0 14px 30px rgba(0, 0, 0, 0.1);
        --radius: 18px;

        --o1: #ff9f45;
        --o2: #79b9d6;
        --o3: #b08a5f;

        --accent: #2b2b2b;
      }

      * {
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
      }
      body {
        margin: 0;
        font-family:
          ui-sans-serif,
          system-ui,
          -apple-system,
          "Segoe UI",
          Roboto,
          Arial,
          sans-serif;
        color: var(--text);
        background:
          radial-gradient(
            1100px 650px at 80% 10%,
            rgba(0, 0, 0, 0.05),
            transparent 55%
          ),
          radial-gradient(
            800px 450px at 15% 35%,
            rgba(255, 159, 69, 0.12),
            transparent 60%
          ),
          var(--bg);
      }

      /* -------- Topbar + Tabs -------- */
      header {
        position: sticky;
        top: 0;
        z-index: 30;
        backdrop-filter: blur(12px);
        background: rgba(255, 255, 255, 0.4);
        border-bottom: 1px solid rgba(0, 0, 0, 0.06);
      }

      .top {
        max-width: 980px;
        margin: 0 auto;
        padding: 14px 16px 10px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 10px;
        min-width: 160px;
      }

      .badge {
        width: 42px;
        height: 42px;
        border-radius: 50%;
        display: grid;
        place-items: center;
        background: #9cd6e6;
        color: #0c3b4a;
        box-shadow: 0 8px 18px rgba(0, 0, 0, 0.1);
      }
      .brand h1 {
        font-size: 15px;
        margin: 0;
        letter-spacing: 0.2px;
      }
      .brand p {
        margin: 2px 0 0;
        font-size: 12px;
        color: var(--muted);
      }

      .actions {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .pill {
        border: 1px solid rgba(0, 0, 0, 0.1);
        background: rgba(255, 255, 255, 0.55);
        border-radius: 999px;
        padding: 8px 12px;
        display: flex;
        align-items: center;
        gap: 8px;
        color: var(--text);
        cursor: pointer;
        transition:
          transform 0.15s ease,
          background 0.2s ease;
        user-select: none;
      }
      .pill:hover {
        transform: translateY(-1px);
        background: rgba(255, 255, 255, 0.75);
      }
      .pill:active {
        transform: translateY(0px) scale(0.99);
      }

      .avatar {
        width: 28px;
        height: 28px;
        border-radius: 50%;
        display: grid;
        place-items: center;
        background: rgba(43, 43, 43, 0.08);
        font-weight: 700;
        font-size: 12px;
      }

      /* Tabs */
      .tabs-wrap {
        max-width: 980px;
        margin: 0 auto;
        padding: 0 16px 12px;
      }
      .tabs {
        position: relative;
        display: flex;
        gap: 10px;
        padding: 8px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.55);
        border: 1px solid rgba(0, 0, 0, 0.06);
        overflow: hidden;
      }
      .tab {
        position: relative;
        flex: 1;
        border: 0;
        background: transparent;
        padding: 10px 12px;
        border-radius: 999px;
        cursor: pointer;
        color: rgba(43, 43, 43, 0.75);
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        font-weight: 650;
        transition:
          color 0.2s ease,
          transform 0.2s ease;
        outline: none;
        z-index: 2;
        white-space: nowrap;
      }
      .tab:hover {
        color: var(--text);
        transform: translateY(-1px);
      }
      .tab:active {
        transform: translateY(0px);
      }

      /* Moving underline indicator (the "line") */
      .indicator {
        position: absolute;
        left: 8px;
        top: calc(100% - 6px);
        height: 3px;
        width: 60px;
        background: var(--accent);
        border-radius: 999px;
        transition:
          transform 0.25s ease,
          width 0.25s ease,
          opacity 0.25s ease;
        opacity: 0.95;
        z-index: 1;
      }

      .tab.active {
        color: var(--text);
      }

      /* -------- Layout -------- */
      main {
        max-width: 980px;
        margin: 0 auto;
        padding: 18px 16px 36px;
      }

      .hero {
        display: grid;
        gap: 14px;
        text-align: center;
        padding: 14px 10px 6px;
      }
      .hero .hello {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 10px;
        font-weight: 750;
      }
      .hero h2 {
        margin: 0;
        font-size: 18px;
      }
      .hero p {
        margin: 0;
        color: var(--muted);
        font-size: 14px;
      }

      .grid {
        margin-top: 18px;
        display: grid;
        grid-template-columns: 1.1fr 0.9fr;
        gap: 14px;
        align-items: start;
      }

      .panel {
        border-radius: var(--radius);
        background: rgba(255, 255, 255, 0.55);
        border: 1px solid rgba(0, 0, 0, 0.06);
        box-shadow: var(--shadow);
        overflow: hidden;
      }

      .panel-head {
        padding: 14px 16px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        border-bottom: 1px solid rgba(0, 0, 0, 0.06);
      }
      .panel-title {
        display: flex;
        align-items: center;
        gap: 10px;
        color: var(--muted);
        font-weight: 700;
        font-size: 13px;
        margin: 0;
      }
      .chip {
        padding: 7px 10px;
        border-radius: 999px;
        border: 1px solid rgba(0, 0, 0, 0.1);
        background: rgba(255, 255, 255, 0.6);
        font-size: 12px;
        color: rgba(43, 43, 43, 0.75);
      }

      /* Offers */
      .offers {
        padding: 14px;
        display: grid;
        gap: 12px;
      }
      .offer {
        border-radius: 18px;
        padding: 16px;
        color: rgba(255, 255, 255, 0.92);
        position: relative;
        overflow: hidden;
        box-shadow: 0 12px 22px rgba(0, 0, 0, 0.12);
        transition:
          transform 0.18s ease,
          box-shadow 0.18s ease;
        cursor: pointer;
      }
      .offer:hover {
        transform: translateY(-2px);
        box-shadow: 0 18px 30px rgba(0, 0, 0, 0.16);
      }
      .offer::after {
        content: "";
        position: absolute;
        width: 240px;
        height: 240px;
        right: -90px;
        top: -120px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.18);
      }
      .offer-top {
        position: relative;
        z-index: 1;
        display: flex;
        justify-content: space-between;
        gap: 10px;
        align-items: flex-start;
      }
      .offer h3 {
        margin: 0 0 6px;
        font-size: 15px;
        font-weight: 800;
        letter-spacing: 0.2px;
      }
      .offer p {
        margin: 0;
        font-size: 13px;
        opacity: 0.95;
      }
      .off-badge {
        background: rgba(255, 255, 255, 0.25);
        padding: 8px 12px;
        border-radius: 999px;
        font-weight: 900;
        font-size: 12px;
        white-space: nowrap;
      }
      .offer-foot {
        margin-top: 12px;
        position: relative;
        z-index: 1;
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 13px;
        opacity: 0.95;
      }

      /* Destinations */
      .destinations {
        padding: 14px;
        display: grid;
        grid-template-columns: 1fr;
        gap: 12px;
      }
      .dest {
        border-radius: 18px;
        overflow: hidden;
        background: rgba(255, 255, 255, 0.75);
        border: 1px solid rgba(0, 0, 0, 0.06);
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
        transition: transform 0.18s ease;
        cursor: pointer;
      }
      .dest:hover {
        transform: translateY(-2px);
      }
      .dest img {
        width: 100%;
        height: 140px;
        object-fit: cover;
        display: block;
      }
      .dest .meta {
        padding: 10px 12px 12px;
      }
      .dest .name {
        margin: 0;
        font-weight: 900;
        font-size: 14px;
      }
      .dest .sub {
        margin: 4px 0 0;
        font-size: 12px;
        color: var(--muted);
      }

      /* Skeleton (loading) */
      .skeleton {
        position: relative;
        overflow: hidden;
        background: rgba(255, 255, 255, 0.55);
        border: 1px solid rgba(0, 0, 0, 0.06);
        border-radius: 18px;
        height: 92px;
      }
      .skeleton::before {
        content: "";
        position: absolute;
        inset: 0;
        transform: translateX(-60%);
        background: linear-gradient(
          90deg,
          transparent,
          rgba(255, 255, 255, 0.55),
          transparent
        );
        animation: shine 1.1s infinite;
      }
      @keyframes shine {
        0% {
          transform: translateX(-60%);
        }
        100% {
          transform: translateX(60%);
        }
      }

      /* Responsive */
      @media (max-width: 900px) {
        .grid {
          grid-template-columns: 1fr;
        }
        .brand {
          min-width: auto;
        }
      }
    </style>
  </head>

  <body>
    <header class="stickyHeader">
      <div class="hTop">
        <div class="hBrand">
          <div class="hBadge" aria-hidden="true">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
              <path
                d="M21 16.5L13 13V21L11 20L9 21V13L3 10.5V8.5L9 10V3.5C9 2.7 9.7 2 10.5 2H13.5C14.3 2 15 2.7 15 3.5V10L21 8.5V16.5Z"
                fill="currentColor"
              />
            </svg>
          </div>
          <div>
            <h1>Sky Trip</h1>
            <p id="miniStatus">Connected</p>
          </div>
        </div>

        <div class="hActions">
          <div class="hPill" id="userPill" title="Profile">
            <div class="hAvatar" id="avatar">U</div>
            <div
              style="display: flex; flex-direction: column; line-height: 1.15"
            >
              <strong style="font-size: 12px" id="username">User</strong>
              <span style="font-size: 12px; color: var(--muted)"
                >Welcome back</span
              >
            </div>
          </div>
        </div>
      </div>

      <div class="hTabsWrap">
        <div class="hTabs" id="tabs">
          <div class="hIndicator" id="indicator"></div>

          <button class="hTab" data-tab="home">
            <span>⌂</span><span>Home</span>
          </button>
          <button class="hTab" data-tab="book">
            <span>✈</span><span>Book</span>
          </button>
          <button class="hTab" data-tab="tickets">
            <span>🎟</span><span>Tickets</span>
          </button>
          <button class="hTab" data-tab="profile">
            <span>👤</span><span>Profile</span>
          </button>
        </div>
      </div>
    </header>

    <main>
      <section class="hero">
        <div class="hello">
          <span aria-hidden="true">☀️</span>
          <h2>
            <span id="greet">Good Afternoon</span>,
            <span id="helloName">User</span>
          </h2>
        </div>
        <p>Ready for your next adventure?</p>
      </section>

      <section class="grid">
        <!-- Offers Panel -->
        <div class="panel">
          <div class="panel-head">
            <p class="panel-title">↗ Latest Offers</p>
            <span class="chip" id="offersChip">Loading...</span>
          </div>
          <div class="offers" id="offersArea">
            <div class="skeleton"></div>
            <div class="skeleton"></div>
            <div class="skeleton"></div>
          </div>
        </div>

        <!-- Destinations Panel -->
        <div class="panel">
          <div class="panel-head">
            <p class="panel-title">☆ Featured Destinations</p>
            <span class="chip" id="destChip">Loading...</span>
          </div>
          <div class="destinations" id="destArea">
            <div class="skeleton" style="height: 200px"></div>
            <div class="skeleton" style="height: 200px"></div>
          </div>
        </div>
      </section>
    </main>

    <script>
      /***********************
       * API CONFIG (ضع رابطك هنا)
       ***********************/
      const API_BASE_URL = "https://localhost:7216"; // <-- حط رابط الـ API تبعك هنا

      // عدّل المسارات حسب الـ API عندك
      const ENDPOINTS = {
        me: "/api/users/me",
        offers: "/api/offers/latest",
        destinations: "/api/destinations/featured",
      };

      // إذا عندك JWT Token مخزن
      // localStorage.setItem("token", "YOUR_TOKEN");
      function getAuthHeaders() {
        const token = localStorage.getItem("auth_token");

        return token ? { Authorization: "Bearer " + token } : {};
      }

      async function fetchJson(url) {
        const res = await fetch(url, {
          headers: { "Content-Type": "application/json", ...getAuthHeaders() },
        });
        if (!res.ok) {
          const text = await res.text().catch(() => "");
          throw new Error(
            "HTTP " + res.status + " - " + (text || res.statusText),
          );
        }
        return res.json();
      }

      /***********************
       * Tabs: underline transition (hover + active)
       ***********************/
      const tabs = document.getElementById("tabs");
      const indicator = document.getElementById("indicator");
      const tabButtons = [...tabs.querySelectorAll(".tab")];

      function placeIndicator(el) {
        const tabsRect = tabs.getBoundingClientRect();
        const r = el.getBoundingClientRect();
        const left = r.left - tabsRect.left;
        const width = r.width;
        indicator.style.width = width + "px";
        indicator.style.transform = "translateX(" + left + "px)";
      }

      // initial
      placeIndicator(tabs.querySelector(".tab.active"));

      tabButtons.forEach((btn) => {
        btn.addEventListener("mouseenter", () => placeIndicator(btn));
        btn.addEventListener("focus", () => placeIndicator(btn));

        btn.addEventListener("click", () => {
          const tab = btn.dataset.tab;

          switch (tab) {
            case "home":
              window.location.href = "home.html";
              break;
            case "book":
              window.location.href = "BookingPage.html";
              break;
            case "tickets":
              window.location.href = "Ticket.html";
              break;
            case "profile":
              window.location.href = "Profile.html";
              break;
          }
        });
      });

      // لما تطلع الماوس يرجع للـ active
      tabs.addEventListener("mouseleave", () => {
        const active = tabs.querySelector(".tab.active");
        if (active) placeIndicator(active);
      });

      window.addEventListener("resize", () => {
        const active = tabs.querySelector(".tab.active");
        if (active) placeIndicator(active);
      });

      /***********************
       * UI helpers
       ***********************/
      function getGreeting() {
        const h = new Date().getHours();
        if (h < 12) return "Good Morning";
        if (h < 18) return "Good Afternoon";
        return "Good Evening";
      }

      function formatDate(dateStr) {
        const d = new Date(dateStr);
        if (Number.isNaN(d.getTime())) return dateStr;
        return d.toLocaleDateString(undefined, {
          year: "numeric",
          month: "short",
          day: "numeric",
        });
      }

      function esc(s) {
        return String(s ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      function offerBg(theme) {
        switch (String(theme || "").toLowerCase()) {
          case "blue":
            return "var(--o2)";
          case "brown":
            return "var(--o3)";
          case "orange":
          default:
            return "var(--o1)";
        }
      }

      /***********************
       * Render
       ***********************/
      const offersArea = document.getElementById("offersArea");
      const destArea = document.getElementById("destArea");
      const offersChip = document.getElementById("offersChip");
      const destChip = document.getElementById("destChip");
      const miniStatus = document.getElementById("miniStatus");

      function renderOffers(list) {
        offersArea.innerHTML = "";
        list.forEach((o) => {
          const div = document.createElement("div");
          div.className = "offer";
          div.style.background = offerBg(o.theme);
          div.innerHTML = `
        <div class="offer-top">
          <div>
            <h3>${esc(o.title)}</h3>
            <p>${esc(o.description || "")}</p>
          </div>
          <div class="off-badge">${Number(o.discountPercent || 0)}% OFF</div>
        </div>
        <div class="offer-foot">
          <span aria-hidden="true">📅</span>
          <span>Valid until ${esc(formatDate(o.validUntil))}</span>
        </div>
      `;
          div.addEventListener("click", () => {
            console.log("Offer clicked:", o);
          });
          offersArea.appendChild(div);
        });
      }

      function renderDestinations(list) {
        destArea.innerHTML = "";
        list.forEach((d) => {
          const card = document.createElement("div");
          card.className = "dest";
          const img =
            d.imageUrl ||
            "https://images.unsplash.com/photo-1502602898657-3e91760cbb34?auto=format&fit=crop&w=1200&q=60";
          card.innerHTML = `
        <img src="${esc(img)}" alt="${esc(d.name || "Destination")}" loading="lazy" />
        <div class="meta">
          <p class="name">${esc(d.name || "Destination")}</p>
          <p class="sub">${esc(d.subtitle || "Explore now")}</p>
        </div>
      `;
          card.addEventListener("click", () =>
            console.log("Destination clicked:", d),
          );
          destArea.appendChild(card);
        });
      }

      /***********************
       * Load from API (with fallback)
       ***********************/
      async function loadAll() {
        document.getElementById("greet").textContent = getGreeting();

        // User
        try {
          const me = await fetchJson(API_BASE_URL + ENDPOINTS.me);
          const username = me.username || me.userName || me.name || "User";
          document.getElementById("username").textContent = username;
          document.getElementById("helloName").textContent = username;

          const letter = username.trim().charAt(0).toUpperCase() || "U";
          document.getElementById("avatar").textContent = letter;

          miniStatus.textContent = "Connected";
        } catch (e) {
          miniStatus.textContent = "API not connected (check base URL / CORS)";
          console.warn("ME error:", e.message);
        }

        // Offers
        try {
          const offers = await fetchJson(API_BASE_URL + ENDPOINTS.offers);
          const list = Array.isArray(offers) ? offers : offers.data || [];
          renderOffers(list);
          offersChip.textContent = list.length + " offers";
        } catch (e) {
          console.warn("Offers error:", e.message);
          const fallback = [
            {
              title: "Summer Sale",
              description: "Book flights to Europe",
              discountPercent: 30,
              validUntil: "2025-12-31",
              theme: "orange",
            },
            {
              title: "Weekend Getaway",
              description: "Domestic flights",
              discountPercent: 20,
              validUntil: "2025-12-20",
              theme: "blue",
            },
            {
              title: "Business Class Upgrade",
              description: "Selected routes",
              discountPercent: 40,
              validUntil: "2025-12-15",
              theme: "brown",
            },
          ];
          renderOffers(fallback);
          offersChip.textContent = "3 offers (demo)";
        }

        // Destinations
        try {
          const dest = await fetchJson(API_BASE_URL + ENDPOINTS.destinations);
          const list = Array.isArray(dest) ? dest : dest.data || [];
          renderDestinations(list);
          destChip.textContent = list.length + " places";
        } catch (e) {
          console.warn("Destinations error:", e.message);
          const fallback = [
            {
              name: "Dubai",
              subtitle: "City of skyscrapers",
              imageUrl:
                "https://images.unsplash.com/photo-1512453979798-5ea266f8880c?auto=format&fit=crop&w=1200&q=60",
            },
            {
              name: "Paris",
              subtitle: "The city of lights",
              imageUrl:
                "https://images.unsplash.com/photo-1502602898657-3e91760cbb34?auto=format&fit=crop&w=1200&q=60",
            },
          ];
          renderDestinations(fallback);
          destChip.textContent = "2 places (demo)";
        }
      }

      loadAll();
    </script>
  </body>
</html>
